<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoPulse Dashboard</title>
  <style>
    /* ── Design tokens ────────────────────────────────────────────────────── */
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --surface-2:    #f7f8fa;
      --border:       #e2e5ea;
      --border-focus: #3b82f6;

      --text-primary:   #0f1117;
      --text-secondary: #5a6272;
      --text-muted:     #9aa1b1;

      --blue:    #3b82f6;
      --green:   #22c55e;
      --red:     #ef4444;
      --orange:  #f97316;

      /* ── Severity tokens ──────────────────────────── */
      --sev-critical-bg:     rgba(239,68,68,.14);
      --sev-critical-border: rgba(220,38,38,.42);
      --sev-critical-text:   #b91c1c;

      --sev-high-bg:         rgba(249,115,22,.12);
      --sev-high-border:     rgba(234,88,12,.38);
      --sev-high-text:       #c2410c;

      --sev-medium-bg:       rgba(245,158,11,.11);
      --sev-medium-border:   rgba(217,119,6,.32);
      --sev-medium-text:     #92400e;

      --sev-low-bg:          rgba(59,130,246,.09);
      --sev-low-border:      rgba(59,130,246,.28);
      --sev-low-text:        #1d4ed8;

      --sev-healthy-bg:      rgba(34,197,94,.11);
      --sev-healthy-border:  rgba(22,163,74,.32);
      --sev-healthy-text:    #15803d;

      --sev-unknown-bg:      rgba(234,179,8,.08);
      --sev-unknown-border:  rgba(168,162,158,.32);
      --sev-unknown-text:    #78716c;

      --sev-neutral-bg:      var(--surface-2);
      --sev-neutral-border:  var(--border);
      --sev-neutral-text:    var(--text-muted);

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0d0f14;
        --surface:      #161b24;
        --surface-2:    #1c2230;
        --border:       #2a3144;
        --border-focus: #3b82f6;

        --text-primary:   #e8eaf0;
        --text-secondary: #8b95a8;
        --text-muted:     #4d576a;

        --shadow-sm: 0 1px 3px rgba(0,0,0,.4),  0 1px 2px rgba(0,0,0,.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.3);

        --sev-critical-bg:     rgba(239,68,68,.18);
        --sev-critical-border: rgba(239,68,68,.50);
        --sev-critical-text:   #f87171;

        --sev-high-bg:         rgba(249,115,22,.16);
        --sev-high-border:     rgba(249,115,22,.45);
        --sev-high-text:       #fb923c;

        --sev-medium-bg:       rgba(245,158,11,.14);
        --sev-medium-border:   rgba(245,158,11,.40);
        --sev-medium-text:     #fbbf24;

        --sev-low-bg:          rgba(59,130,246,.12);
        --sev-low-border:      rgba(59,130,246,.32);
        --sev-low-text:        #60a5fa;

        --sev-healthy-bg:      rgba(34,197,94,.14);
        --sev-healthy-border:  rgba(34,197,94,.38);
        --sev-healthy-text:    #4ade80;

        --sev-unknown-bg:      rgba(234,179,8,.11);
        --sev-unknown-border:  rgba(163,163,163,.32);
        --sev-unknown-text:    #d6d3d1;
      }
    }

    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ─────────────────────────────────────────────────────────────── */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Top bar ──────────────────────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      background: var(--blue);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo svg { display: block; }

    .topbar-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .topbar-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .topbar-spacer { flex: 1; }

    .pulse-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Page layout ──────────────────────────────────────────────────────── */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .page-header p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Section ──────────────────────────────────────────────────────────── */
    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .section-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Card grid ────────────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .card-label {
      font-size: 0.67rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
      word-break: break-word;
    }

    /* ── Summary cards — denser vertical rhythm ───────────────────────────── */
    #summary-cards .card {
      padding: 10px 16px;
    }

    #summary-cards .card-label {
      margin-bottom: 5px;
    }

    /* ── Portfolio trend value colors ─────────────────────────────────────── */
    #portfolio-trend-value.trend-worsening { color: var(--sev-high-text); }
    #portfolio-trend-value.trend-improving { color: var(--sev-healthy-text); }
    #portfolio-trend-value.trend-stable    { color: var(--text-secondary); }
    #portfolio-trend-value.trend-unknown   { color: var(--text-muted); }

    /* Status-aware value colors */
    .card-value.at-risk,
    .card-value.critical,
    .card-value.worsening { color: var(--red); }

    .card-value.healthy,
    .card-value.improving  { color: var(--green); }

    .card-value.monitor    { color: var(--orange); }

    /* Status badge pill on cards */
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid transparent;
    }

    .card-badge.at-risk, .card-badge.critical, .card-badge.worsening {
      background: var(--sev-critical-bg);
      border-color: var(--sev-critical-border);
      color: var(--sev-critical-text);
    }

    .card-badge.healthy, .card-badge.improving {
      background: var(--sev-healthy-bg);
      border-color: var(--sev-healthy-border);
      color: var(--sev-healthy-text);
    }

    .card-badge.monitor {
      background: var(--sev-medium-bg);
      border-color: var(--sev-medium-border);
      color: var(--sev-medium-text);
    }

    .card-badge.normal, .card-badge.stable {
      background: var(--sev-neutral-bg);
      border-color: var(--sev-neutral-border);
      color: var(--sev-neutral-text);
    }

    .card-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Panel (shared surface for chart / table / history) ───────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-head h2 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .panel-head .panel-count {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 8px;
    }

    .panel-body { padding: 20px; }

    /* ── Chart ────────────────────────────────────────────────────────────── */
    .chart-svg {
      display: block;
      width: 100%;
      height: 200px;
    }

    .chart-axis-label {
      font-size: 10px;
      fill: var(--text-muted);
      font-family: var(--font-mono);
    }

    .chart-line {
      fill: none;
      stroke: var(--blue);
      stroke-width: 2.5;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .chart-area { fill: url(#areaGradient); }

    .chart-dot {
      fill: var(--blue);
      stroke: var(--surface);
      stroke-width: 2;
    }

    .chart-dot.risk-high { fill: var(--red); }

    .chart-gridline {
      stroke: var(--border);
      stroke-width: 1;
    }

    /* ── Projects table ───────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      text-align: left;
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child { padding-left: 0; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody tr.row-selected { background: rgba(59,130,246,.08); }

    tbody td {
      padding: 11px 12px;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    tbody td:first-child {
      padding-left: 0;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid transparent;
    }

    .status-pill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.healthy  { background: var(--sev-healthy-bg);  border-color: var(--sev-healthy-border);  color: var(--sev-healthy-text); }
    .status-pill.at-risk  { background: var(--sev-critical-bg); border-color: var(--sev-critical-border); color: var(--sev-critical-text); }

    /* ── Filter bar ──────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .filter-btn:hover {
      border-color: var(--border-focus);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── Repo detail ─────────────────────────────────────────────────────── */
    .repo-detail {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .repo-detail-label {
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Sparkline ───────────────────────────────────────────────────────── */
    .sparkline-svg {
      display: block;
      width: 100%;
      height: 48px;
      margin-bottom: 16px;
    }

    /* ── Error ────────────────────────────────────────────────────────────── */
    .error-msg {
      font-size: 0.82rem;
      color: var(--red);
      padding: 8px 0;
    }

    /* ── Attention badge ─────────────────────────────────────────────────── */
    .aq-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .aq-badge.severity-critical { background: var(--sev-critical-bg); border: 1px solid var(--sev-critical-border); color: var(--sev-critical-text); }
    .aq-badge.severity-high     { background: var(--sev-high-bg);     border: 1px solid var(--sev-high-border);     color: var(--sev-high-text);     }
    .aq-badge.severity-medium   { background: var(--sev-medium-bg);   border: 1px solid var(--sev-medium-border);   color: var(--sev-medium-text);   }
    .aq-badge.severity-low      { background: var(--sev-low-bg);      border: 1px solid var(--sev-low-border);      color: var(--sev-low-text);      }
    .aq-badge.severity-unknown  { background: var(--sev-unknown-bg);  border: 1px solid var(--sev-unknown-border);  color: var(--sev-unknown-text);  }
    .aq-badge.severity-healthy  { background: var(--sev-healthy-bg);  border: 1px solid var(--sev-healthy-border);  color: var(--sev-healthy-text);  }

    /* ── Trend indicator tag ─────────────────────────────────────────────── */
    .trend-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .trend-tag.trend-worsening { background: var(--sev-high-bg);     color: var(--sev-high-text);     border: 1px solid var(--sev-high-border); }
    .trend-tag.trend-improving { background: var(--sev-healthy-bg);  color: var(--sev-healthy-text);  border: 1px solid var(--sev-healthy-border); }
    .trend-tag.trend-stable    { background: var(--sev-neutral-bg);  color: var(--sev-neutral-text);  border: 1px solid var(--sev-neutral-border); }

    /* ── Reusable severity state classes ─────────────────────────────────── */
    .severity-critical { background: var(--sev-critical-bg); border-color: var(--sev-critical-border); color: var(--sev-critical-text); }
    .severity-high     { background: var(--sev-high-bg);     border-color: var(--sev-high-border);     color: var(--sev-high-text);     }
    .severity-medium   { background: var(--sev-medium-bg);   border-color: var(--sev-medium-border);   color: var(--sev-medium-text);   }
    .severity-low      { background: var(--sev-low-bg);      border-color: var(--sev-low-border);      color: var(--sev-low-text);      }
    .severity-healthy  { background: var(--sev-healthy-bg);  border-color: var(--sev-healthy-border);  color: var(--sev-healthy-text);  }
    .severity-unknown  { background: var(--sev-unknown-bg);  border-color: var(--sev-unknown-border);  color: var(--sev-unknown-text);  }
    .severity-neutral  { background: var(--sev-neutral-bg);  border-color: var(--sev-neutral-border);  color: var(--sev-neutral-text);  }

    .aq-score {
      font-weight: 400;
      font-size: 0.88em;
      opacity: 0.72;
    }

    /* ── Table cell helpers ──────────────────────────────────────────────── */
    .tbl-repo-name {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-primary);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tbl-reasons {
      display: block;
      font-size: 0.78rem;
      color: var(--text-secondary);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Portfolio narrative banner ──────────────────────────────────────── */
    .narrative-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .narrative-banner.narrative-critical { border-left: 3px solid var(--sev-critical-border); background: var(--sev-critical-bg); }
    .narrative-banner.narrative-high     { border-left: 3px solid var(--sev-high-border);     background: var(--sev-high-bg);     }
    .narrative-banner.narrative-medium   { border-left: 3px solid var(--sev-medium-border);   background: var(--sev-medium-bg);   }
    .narrative-banner.narrative-low      { border-left: 3px solid var(--sev-low-border);      background: var(--sev-low-bg);      }
    .narrative-banner.narrative-healthy  { border-left: 3px solid var(--sev-healthy-border);  background: var(--sev-healthy-bg);  }

    .narrative-badge {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 9px;
      border-radius: 99px;
      border: 1px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .narrative-text { flex: 1; }
    .narrative-drivers { font-style: italic; }

    /* ── Repo operational assessment card ────────────────────────────────── */
    .assessment-card {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      background: var(--surface-2);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-primary);
      margin-top: 8px;
    }

    .assessment-card.severity-critical { border-left-color: var(--sev-critical-border); background: var(--sev-critical-bg); }
    .assessment-card.severity-high     { border-left-color: var(--sev-high-border);     background: var(--sev-high-bg);     }
    .assessment-card.severity-medium   { border-left-color: var(--sev-medium-border);   background: var(--sev-medium-bg);   }
    .assessment-card.severity-low      { border-left-color: var(--sev-low-border);      background: var(--sev-low-bg);      }
    .assessment-card.severity-healthy  { border-left-color: var(--sev-healthy-border);  background: var(--sev-healthy-bg);  }
    .assessment-card.severity-unknown  { border-left-color: var(--sev-unknown-border);  background: var(--sev-unknown-bg);  }

    /* ── Operational event timeline ─────────────────────────────────────── */
    .timeline-list {
      display: flex;
      flex-direction: column;
      margin-top: 8px;
    }

    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }

    .timeline-item:last-child {
      border-bottom: none;
    }

    .timeline-badge {
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 2px 6px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .timeline-badge.severity-critical { background: var(--sev-critical-bg); border: 1px solid var(--sev-critical-border); color: var(--sev-critical-text); }
    .timeline-badge.severity-high     { background: var(--sev-high-bg);     border: 1px solid var(--sev-high-border);     color: var(--sev-high-text);     }
    .timeline-badge.severity-medium   { background: var(--sev-medium-bg);   border: 1px solid var(--sev-medium-border);   color: var(--sev-medium-text);   }
    .timeline-badge.severity-healthy  { background: var(--sev-healthy-bg);  border: 1px solid var(--sev-healthy-border);  color: var(--sev-healthy-text);  }
    .timeline-badge.severity-unknown  { background: var(--sev-unknown-bg);  border: 1px solid var(--sev-unknown-border);  color: var(--sev-unknown-text);  }

    .timeline-content {
      flex: 1;
      min-width: 0;
    }

    .timeline-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .timeline-desc {
      font-size: 0.76rem;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .timeline-time {
      font-size: 0.70rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* ── Recommended actions list ────────────────────────────────────────── */
    .actions-list {
      list-style: none;
      margin: 8px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      color: var(--text-primary);
      padding: 8px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .action-item::before {
      content: '';
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border-focus);
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" fill="white"/>
        <circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
      </svg>
    </div>
    <span class="topbar-title">RepoPulse</span>
    <span class="topbar-subtitle">Command Center</span>
    <div class="topbar-spacer"></div>
    <button id="sync-btn" onclick="syncRepos()" style="
      font-size:0.75rem;font-weight:600;padding:5px 14px;border-radius:99px;
      border:1px solid var(--border);background:var(--surface-2);
      color:var(--text-secondary);cursor:pointer;transition:background 0.1s,color 0.1s;">
      Sync Now
    </button>
    <div class="pulse-indicator" style="margin-left:12px;">
      <div class="pulse-dot"></div>
      <span id="pulse-label">Live · 60s</span>
    </div>
  </header>

  <div class="page">

    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Real-time health and risk overview across all tracked repositories.</p>
    </div>

    <!-- Summary cards -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Summary</span>
        <div class="section-divider"></div>
      </div>
      <div id="summary-cards" class="card-grid">
        <div class="card"><div class="card-label">Loading</div><div class="card-value">—</div></div>
      </div>
    </div>

    <!-- Portfolio narrative banner -->
    <div id="portfolio-narrative" style="margin-bottom:24px;"></div>

    <!-- Projects table -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Projects</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Repository Status</h2>
          <span id="projects-count" class="panel-count">—</span>
        </div>
        <div class="panel-body">
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="At Risk">At Risk</button>
            <button class="filter-btn" data-filter="Healthy">Healthy</button>
          </div>
          <div id="projects-container"><p class="error-msg">Loading…</p></div>
          <div id="repo-detail" class="repo-detail" hidden></div>
        </div>
      </div>
    </div>

    <!-- History chart -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Risk Score Over Time</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Risk Score History</h2>
          <span id="chart-count" class="panel-count">— snapshots</span>
        </div>
        <div class="panel-body" style="padding: 16px 20px 8px;">
          <svg id="history-chart" class="chart-svg" aria-label="Risk score history chart">
            <defs>
              <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <text x="50%" y="50%" text-anchor="middle" class="chart-axis-label">Loading…</text>
          </svg>
        </div>
      </div>
    </div>

    <!-- History list -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Snapshot Log</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Snapshot History</h2>
        </div>
        <div class="panel-body">
          <svg id="history-sparkline" class="sparkline-svg" aria-label="Risk score sparkline — last 10 snapshots"></svg>
          <div id="history-list"><p class="error-msg">Loading…</p></div>
        </div>
      </div>
    </div>

  </div><!-- /page -->

  <script>
    // ── Helpers ─────────────────────────────────────────────────────────────

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function labelClass(label) {
      if (!label) return 'severity-unknown';
      var v = label.toLowerCase();
      if (v === 'critical') return 'severity-critical';
      if (v === 'high')     return 'severity-high';
      if (v === 'at-risk')  return 'severity-high';
      if (v === 'medium')   return 'severity-medium';
      if (v === 'low')      return 'severity-low';
      if (v === 'healthy')  return 'severity-healthy';
      if (v === 'unknown')  return 'severity-unknown';
      return 'severity-neutral';
    }

    function trendTag(ti) {
      if (!ti || ti.direction === 'unknown') return '';
      var arrow = ti.direction === 'worsening' ? '↑'
                : ti.direction === 'improving' ? '↓'
                : '→';
      var cls   = ti.direction === 'worsening' ? 'trend-tag trend-worsening'
                : ti.direction === 'improving' ? 'trend-tag trend-improving'
                : 'trend-tag trend-stable';
      var delta = ti.delta != null
        ? (ti.delta > 0 ? ' +' : ' ') + String(ti.delta)
        : '';
      return ' <span class="' + cls + '">' + arrow + delta + '</span>';
    }

    function card(label, value, cls) {
      var valueHtml = cls
        ? '<span class="card-badge ' + cls + '">' + esc(String(value)) + '</span>'
        : '<div class="card-value">' + esc(String(value)) + '</div>';
      return '<div class="card">'
        + '<div class="card-label">' + esc(label) + '</div>'
        + valueHtml
        + '</div>';
    }

    function showError(id, msg) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = '<p class="error-msg">Error: ' + esc(String(msg)) + '</p>';
    }

    // ── Risk explanation panel ───────────────────────────────────────────────

    function buildExplanationHtml(exp) {
      if (!exp || !exp.hasMetrics) {
        return '<p style="font-size:0.82rem;color:var(--sev-unknown-text);font-style:italic;padding:4px 0;">'
          + 'No metrics available yet. Click <strong>Sync Now</strong> to analyze this repository.'
          + '</p>';
      }
      var html = '';
      if (exp.allClear) {
        html += '<p style="font-size:0.82rem;color:var(--sev-healthy-text);padding:4px 0;">&#10003; No risk signals detected for this repository.</p>';
      } else {
        html += '<ul style="font-size:0.82rem;padding-left:18px;line-height:1.9;margin-bottom:10px;">';
        exp.triggered.forEach(function(f) {
          html += '<li style="color:var(--sev-critical-text);">&#9888;&#xFE0E; ' + esc(f) + '</li>';
        });
        html += '</ul>';
      }
      if (exp.notMeasured && exp.notMeasured.length) {
        html += '<ul style="font-size:0.78rem;color:var(--sev-unknown-text);padding-left:18px;line-height:1.8;">';
        exp.notMeasured.forEach(function(m) {
          html += '<li>' + esc(m) + ': not yet measured</li>';
        });
        html += '</ul>';
      }
      return html;
    }

    // ── Chart (avg risk score per sync window) ────────────────────────────────

    function renderChart(points) {
      var svg = document.getElementById('history-chart');
      var W = svg.clientWidth  || 880;
      var H = svg.clientHeight || 200;
      var PAD = { top: 20, right: 24, bottom: 36, left: 40 };
      var innerW = W - PAD.left - PAD.right;
      var innerH = H - PAD.top  - PAD.bottom;

      var countEl = document.getElementById('chart-count');
      if (countEl) countEl.textContent = points.length + ' snapshot' + (points.length !== 1 ? 's' : '');

      if (!points.length) {
        svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" class="chart-axis-label">No data yet — run a sync first</text>';
        return;
      }

      function xPos(i) {
        return PAD.left + (points.length === 1 ? innerW / 2 : i * (innerW / (points.length - 1)));
      }
      function yPos(v) {
        return PAD.top + innerH - (v / 100) * innerH;
      }
      function shortDate(iso) {
        var d = new Date(iso);
        return (d.getMonth() + 1) + '/' + d.getDate()
          + ' ' + String(d.getHours()).padStart(2,'0')
          + ':' + String(d.getMinutes()).padStart(2,'0');
      }

      var p = [];
      p.push('<defs>'
        + '<linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">'
        + '<stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.2"/>'
        + '<stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>'
        + '</linearGradient></defs>');

      [0, 25, 50, 75, 100].forEach(function(v) {
        var y = yPos(v);
        p.push('<line class="chart-gridline" x1="' + PAD.left + '" y1="' + y + '" x2="' + (PAD.left + innerW) + '" y2="' + y + '"/>');
        p.push('<text class="chart-axis-label" x="' + (PAD.left - 8) + '" y="' + (y + 4) + '" text-anchor="end">' + v + '</text>');
      });

      [[0,'start'], [points.length - 1, 'end']].forEach(function(pair) {
        var i = pair[0], anchor = pair[1];
        if (!points[i]) return;
        p.push('<text class="chart-axis-label" x="' + xPos(i) + '" y="' + (H - 8) + '" text-anchor="' + anchor + '">'
          + esc(shortDate(points[i].at)) + '</text>');
      });

      var aD = 'M ' + xPos(0) + ' ' + yPos(points[0].score);
      points.forEach(function(pt, i) { if (i > 0) aD += ' L ' + xPos(i) + ' ' + yPos(pt.score); });
      aD += ' L ' + xPos(points.length - 1) + ' ' + yPos(0) + ' L ' + xPos(0) + ' ' + yPos(0) + ' Z';
      p.push('<path class="chart-area" d="' + aD + '"/>');

      var lD = 'M ' + xPos(0) + ' ' + yPos(points[0].score);
      points.forEach(function(pt, i) { if (i > 0) lD += ' L ' + xPos(i) + ' ' + yPos(pt.score); });
      p.push('<path class="chart-line" d="' + lD + '"/>');

      points.forEach(function(pt, i) {
        var cls = 'chart-dot' + (pt.score >= 60 ? ' risk-high' : '');
        p.push('<circle class="' + cls + '" cx="' + xPos(i) + '" cy="' + yPos(pt.score) + '" r="4.5">'
          + '<title>' + esc(shortDate(pt.at)) + ' — avg score: ' + pt.score + '</title>'
          + '</circle>');
      });

      svg.innerHTML = p.join('');
    }

    // ── Sparkline ────────────────────────────────────────────────────────────

    function renderSparkline(data) {
      var svg = document.getElementById('history-sparkline');
      if (!svg) return;
      if (!data.length) { svg.innerHTML = ''; return; }
      var W = svg.clientWidth || 600;
      var H = 48, PAD = 4;
      var innerW = W - PAD * 2, innerH = H - PAD * 2;
      function xPos(i) { return PAD + (data.length === 1 ? innerW / 2 : i * (innerW / (data.length - 1))); }
      function yPos(v) { return PAD + innerH - (v / 100) * innerH; }
      var pts = data.map(function(pt, i) { return xPos(i) + ',' + yPos(pt.score); }).join(' ');
      var last = data[data.length - 1];
      svg.innerHTML =
        '<polyline points="' + pts + '" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
        + '<circle cx="' + xPos(data.length - 1) + '" cy="' + yPos(last.score) + '" r="3.5"'
        + ' fill="' + (last.score >= 60 ? 'var(--red)' : 'var(--blue)') + '" stroke="var(--surface)" stroke-width="1.5">'
        + '<title>Latest avg score: ' + last.score + '</title></circle>';
    }

    // ── Sync ─────────────────────────────────────────────────────────────────

    function syncRepos() {
      var btn = document.getElementById('sync-btn');
      btn.disabled = true;
      btn.textContent = 'Syncing…';
      fetch('/api/repos/sync', { method: 'POST', credentials: 'include' })
        .then(function(r) {
          return r.json().then(function(body) { return { ok: r.ok, status: r.status, body: body }; });
        })
        .then(function(result) {
          if (result.ok) {
            btn.textContent = 'Sync started';
          } else {
            var msg = (result.body && result.body.error) ? result.body.error : ('Sync failed (' + result.status + ')');
            btn.textContent = 'Sync failed';
            btn.title = msg;
            console.warn('[Sync] ' + result.status + ':', msg);
          }
          setTimeout(function() {
            btn.textContent = 'Sync Now';
            btn.title = '';
            btn.disabled = false;
            if (result.ok) refresh();
          }, 3000);
        })
        .catch(function(e) {
          btn.textContent = 'Sync Now';
          btn.disabled = false;
          console.warn('[Sync] Network error:', e.message);
        });
    }

    // ── Portfolio trend card ──────────────────────────────────────────────────

    function portfolioTrend() {
      if (!_repos.length) return { arrow: '?', label: 'Unknown', cls: 'trend-unknown' };
      var dirs = _repos.map(function(r) {
        return (r.trendIndicator && r.trendIndicator.direction) || 'unknown';
      });
      if (dirs.some(function(d) { return d === 'worsening'; }))
        return { arrow: '↑', label: 'Worsening', cls: 'trend-worsening' };
      if (dirs.some(function(d) { return d === 'improving'; }))
        return { arrow: '↓', label: 'Improving', cls: 'trend-improving' };
      if (dirs.some(function(d) { return d === 'stable'; }))
        return { arrow: '→', label: 'Stable', cls: 'trend-stable' };
      return { arrow: '?', label: 'Unknown', cls: 'trend-unknown' };
    }

    function renderPortfolioTrend() {
      var el = document.getElementById('portfolio-trend-value');
      if (!el) return;
      var t = portfolioTrend();
      el.textContent = t.arrow + ' ' + t.label;
      el.className = 'card-value ' + t.cls;
    }

    // ── Summary ───────────────────────────────────────────────────────────────

    function renderSummaryCards(d, source) {
      var fields;
      if (source === 'db') {
        // /api/repos/summary field names (DB-backed, authenticated)
        var atRiskTotal = (d.atRisk || 0) + (d.critical || 0);
        var statusLabel = atRiskTotal > 0 ? 'At Risk' : 'Healthy';
        var statusCls   = atRiskTotal > 0 ? 'severity-high' : 'severity-healthy';
        fields = [
          ['Repos',     d.totalRepos != null ? d.totalRepos : '—', ''],
          ['Healthy',   d.healthy    != null ? d.healthy    : '—', 'severity-healthy'],
          ['At Risk',   atRiskTotal,                                atRiskTotal > 0 ? 'severity-high' : ''],
          ['Avg Score', d.avgScore   != null ? d.avgScore   : '—', ''],
          ['Status',    statusLabel,                                statusCls],
        ];
      } else {
        // /summary field names (file-backed seed, unauthenticated fallback)
        var demoCls = d.systemStatus === 'At Risk' ? 'severity-high' : 'severity-healthy';
        fields = [
          ['Repos',      d.totalProjects  != null ? d.totalProjects  : '—', ''],
          ['Healthy',    d.healthyProjects != null ? d.healthyProjects : '—', 'severity-healthy'],
          ['At Risk',    d.atRiskProjects  != null ? d.atRiskProjects  : '—', d.atRiskProjects > 0 ? 'severity-high' : ''],
          ['Risk Score', d.riskScore       != null ? d.riskScore       : '—', ''],
          ['Status',     d.systemStatus    || '—',                           demoCls],
        ];
      }
      document.getElementById('summary-cards').innerHTML =
        fields.map(function(f) { return card(f[0], f[1], f[2]); }).join('')
        + '<div class="card"><div class="card-label">Trend</div>'
        + '<div id="portfolio-trend-value" class="card-value trend-unknown">? Unknown</div></div>';
      renderPortfolioTrend();
    }

    function loadSummary() {
      // Prefer the authenticated DB-backed summary (/api/repos/summary).
      // Falls back to the seed/demo summary (/summary) on 401/403 so
      // unauthenticated visitors still see something meaningful.
      fetch('/api/repos/summary', { credentials: 'include' })
        .then(function(r) {
          if (r.status === 401 || r.status === 403) return { _useFallback: true };
          if (!r.ok) return { _useFallback: true };
          return r.json().then(function(d) { return { _source: 'db', _data: d }; });
        })
        .then(function(result) {
          if (result._useFallback) {
            return fetch('/summary')
              .then(function(r) { return r.json(); })
              .then(function(d) { renderSummaryCards(d, 'demo'); });
          }
          renderSummaryCards(result._data, result._source);
        })
        .catch(function(e) { showError('summary-cards', e.message); });
    }

    // ── Repos table ───────────────────────────────────────────────────────────

    var _repos = [];
    var _selectedId = null;
    var _activeFilter = 'All';
    var _attentionMap = {};

    // ── Operational assessment ───────────────────────────────────────────────

    function capitalise(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
    }

    function buildRepoAssessment(repo) {
      var aq    = _attentionMap[repo.id] || null;
      var exp   = repo.explanation || {};
      var ci    = repo.ciStatus          || 'unknown';
      var rel   = repo.releaseStatus     || 'unknown';
      var contr = repo.contributorStatus || 'unknown';

      var fallbackLevel = repo.label === 'critical' ? 'critical'
                        : repo.label === 'at-risk'  ? 'high'
                        : repo.label === 'healthy'  ? 'healthy'
                        : 'unknown';
      var level = (aq && aq.attentionLevel) ? aq.attentionLevel : fallbackLevel;

      if (!exp.hasMetrics) {
        return {
          text:  'This repository cannot be fully assessed because no metrics have been collected yet. Run a sync to gather data.',
          level: 'unknown'
        };
      }

      // Operational concerns — ordered by severity
      var concerns = [];
      if (ci === 'failing')            concerns.push('CI pipeline failures');
      if (contr === 'abandoned')       concerns.push('the repository appears abandoned');
      if (contr === 'bus_factor_risk') concerns.push('contributor concentration');
      if (rel === 'stale')             concerns.push('stale release cadence');
      if (rel === 'none')              concerns.push('no release history');
      if (contr === 'low_activity')    concerns.push('low contributor activity');

      // Missing telemetry
      var gaps = [];
      if (ci === 'unknown')    gaps.push('CI status');
      if (rel === 'unknown')   gaps.push('release status');
      if (contr === 'unknown') gaps.push('contributor status');

      var top2 = concerns.slice(0, 2);
      var text  = '';

      if (level === 'healthy') {
        if (!concerns.length && !gaps.length) {
          var positives = [];
          if (contr === 'healthy') positives.push('stable contributor activity');
          if (ci === 'passing')    positives.push('passing CI');
          if (rel === 'healthy')   positives.push('regular releases');
          text = positives.length
            ? 'This repository appears healthy with ' + positives.slice(0, 2).join(' and ') + ' — no major operational concerns.'
            : 'Operational signals are healthy with no immediate maintenance concerns.';
        } else if (!concerns.length) {
          text = 'This repository is operationally healthy, though ' + gaps.join(' and ') + ' are not yet measured.';
        } else {
          text = 'This repository is generally stable. ' + capitalise(concerns[0]) + ' may warrant a closer look.';
        }
      } else if (level === 'low') {
        if (top2.length) {
          text = 'This repository is largely stable but ' + top2.join(' and ') + ' may warrant a closer look.';
        } else if (gaps.length) {
          text = 'This repository appears low-risk, though ' + gaps.slice(0, 2).join(' and ') + ' are not yet measured.';
        } else {
          text = 'This repository shows minor operational signals worth monitoring.';
        }
      } else if (level === 'medium') {
        if (top2.length >= 2) {
          text = capitalise(top2[0]) + ' and ' + top2[1] + ' increase operational risk for this repository.';
        } else if (top2.length === 1) {
          text = capitalise(top2[0]) + ' elevates operational risk for this repository.';
        } else {
          text = 'This repository has moderate operational risk due to incomplete status data.';
        }
        if (gaps.length && top2.length < 2) {
          text += ' ' + capitalise(gaps.slice(0, 2).join(' and ')) + ' are not yet measured.';
        }
      } else if (level === 'high') {
        if (top2.length >= 2) {
          text = 'This repository has elevated operational risk due to ' + top2[0] + ' and ' + top2[1] + '.';
        } else if (top2.length === 1) {
          text = 'This repository has elevated operational risk due to ' + top2[0] + '.';
        } else {
          text = 'This repository has elevated operational risk.';
        }
        if (gaps.length) {
          text += ' Visibility is limited as ' + gaps.slice(0, 2).join(' and ') + ' are not yet measured.';
        }
      } else if (level === 'critical') {
        if (top2.length >= 2) {
          text = capitalise(top2[0]) + ' and ' + top2[1] + ' represent critical operational risk — immediate attention recommended.';
        } else if (top2.length === 1) {
          text = capitalise(top2[0]) + ' represents critical operational risk — immediate attention recommended.';
        } else {
          text = 'This repository has critical operational risk and requires immediate attention.';
        }
        if (gaps.length) {
          text += ' Some signals remain unmeasured: ' + gaps.slice(0, 2).join(', ') + '.';
        }
      } else {
        text = 'Operational state is uncertain — insufficient status data to make an assessment.';
      }

      return { text: text, level: level };
    }

    function buildAssessmentHtml(repo) {
      var a = buildRepoAssessment(repo);
      return '<div class="assessment-card severity-' + a.level + '">' + esc(a.text) + '</div>';
    }

    // ── Recommended actions ──────────────────────────────────────────────────

    function buildRecommendedActions(repo) {
      var exp   = repo.explanation || {};
      var ci    = repo.ciStatus          || 'unknown';
      var rel   = repo.releaseStatus     || 'unknown';
      var contr = repo.contributorStatus || 'unknown';

      if (!exp.hasMetrics) {
        return ['Run repository sync'];
      }

      var actions = [];
      if (ci === 'failing')            actions.push('Investigate failing CI workflows');
      if (contr === 'abandoned')       actions.push('Review repository ownership');
      if (contr === 'bus_factor_risk') actions.push('Add additional maintainers');
      if (rel === 'stale')             actions.push('Review release cadence');
      if (rel === 'none')              actions.push('Create a tagged release');
      if (ci === 'unknown')            actions.push('Configure GitHub Actions CI');
      if (contr === 'low_activity')    actions.push('Encourage contributor activity');

      return actions.slice(0, 4);
    }

    function buildActionsHtml(repo) {
      var actions = buildRecommendedActions(repo);

      if (!actions.length) {
        return '<p style="font-size:0.82rem;color:var(--sev-healthy-text);padding:4px 0 2px;">'
          + '&#10003; No immediate operational actions recommended.</p>';
      }

      return '<ul class="actions-list">'
        + actions.map(function(a) {
            return '<li class="action-item">' + esc(a) + '</li>';
          }).join('')
        + '</ul>';
    }

    // ── Operational timeline ──────────────────────────────────────────────────

    function buildTimelineHtml(events) {
      if (!events || !events.length) {
        return '<p style="font-size:0.82rem;color:var(--text-muted);font-style:italic;padding:4px 0;">'
          + 'No operational events detected yet.</p>';
      }
      return '<div class="timeline-list">'
        + events.map(function(ev) {
            var badgeCls = 'timeline-badge severity-' + (ev.severity || 'unknown');
            var badgeText = ev.severity === 'healthy' ? 'RECOVERY'
                          : ev.severity === 'critical' ? 'CRITICAL'
                          : ev.severity === 'high' ? 'HIGH'
                          : ev.severity === 'medium' ? 'MEDIUM'
                          : 'INFO';
            var timeStr = ev.timestamp
              ? new Date(ev.timestamp).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
              : '—';
            return '<div class="timeline-item">'
              + '<span class="' + esc(badgeCls) + '">' + esc(badgeText) + '</span>'
              + '<div class="timeline-content">'
              + '<div class="timeline-title">' + esc(ev.title || '') + '</div>'
              + '<div class="timeline-desc">' + esc(ev.description || '') + '</div>'
              + '</div>'
              + '<span class="timeline-time">' + esc(timeStr) + '</span>'
              + '</div>';
          }).join('')
        + '</div>';
    }

    function loadRepoTimeline(repoId) {
      var container = document.getElementById('repo-timeline-content');
      if (!container) return;
      container.innerHTML = '<p style="font-size:0.82rem;color:var(--text-muted);">Loading…</p>';
      fetch('/api/repos/' + encodeURIComponent(String(repoId)) + '/events', { credentials: 'include' })
        .then(function(r) {
          if (r.status === 401 || r.status === 403) return null;
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          container.innerHTML = buildTimelineHtml(d.events || []);
        })
        .catch(function() {
          if (container) {
            container.innerHTML = '<p style="font-size:0.82rem;color:var(--text-muted);font-style:italic;padding:4px 0;">'
              + 'No operational events detected yet.</p>';
          }
        });
    }

    function selectRepo(repo) {
      if (!repo) return;
      _selectedId = repo.id;

      var tbody = document.querySelector('#projects-container tbody');
      if (tbody) {
        Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr) {
          tr.classList.toggle('row-selected', tr.dataset.id === String(repo.id));
        });
      }

      var cls      = labelClass(repo.label);
      var syncTime = repo.lastSyncedAt ? new Date(repo.lastSyncedAt).toLocaleString() : 'Not synced yet';
      var exp      = repo.explanation || {};

      var ciStatus = repo.ciStatus || 'unknown';
      var ciLabel  = ciStatus === 'passing' ? 'Passing'
                   : ciStatus === 'failing' ? 'Failing'
                   : 'Unknown';
      var ciCls    = ciStatus === 'passing' ? 'severity-healthy'
                   : ciStatus === 'failing' ? 'severity-critical'
                   : 'severity-unknown';

      var relStatus = repo.releaseStatus || 'unknown';
      var relAge    = '';
      if (repo.latestReleasePublishedAt) {
        var days = Math.floor((Date.now() - new Date(repo.latestReleasePublishedAt).getTime()) / 86400000);
        relAge   = days === 0 ? ' (today)' : ' (' + days + 'd ago)';
      }
      var relLabel  = relStatus === 'healthy' ? 'Healthy' + relAge
                    : relStatus === 'stale'   ? 'Stale'   + relAge
                    : relStatus === 'none'    ? 'No releases'
                    : 'Unknown';
      var relCls    = relStatus === 'healthy' ? 'severity-healthy'
                    : relStatus === 'stale'   ? 'severity-high'
                    : relStatus === 'none'    ? 'severity-medium'
                    : 'severity-unknown';

      var contrStatus = repo.contributorStatus || 'unknown';
      var contrCount  = repo.activeContributorCount != null ? repo.activeContributorCount : null;
      var contrPct    = repo.topContributorPercentage != null ? repo.topContributorPercentage : null;
      var contrDetail = contrCount !== null ? ' (' + contrCount + ' contributor' + (contrCount !== 1 ? 's' : '') + ')' : '';
      if (contrPct !== null && (contrStatus === 'bus_factor_risk')) {
        contrDetail = ' (' + contrPct + '% by top)';
      }
      var contrLabel  = contrStatus === 'healthy'         ? 'Healthy'     + contrDetail
                      : contrStatus === 'low_activity'    ? 'Low activity' + contrDetail
                      : contrStatus === 'bus_factor_risk' ? 'Bus-factor risk' + contrDetail
                      : contrStatus === 'abandoned'       ? 'Abandoned'
                      : 'Unknown';
      var contrCls    = contrStatus === 'healthy'         ? 'severity-healthy'
                      : contrStatus === 'low_activity'    ? 'severity-medium'
                      : contrStatus === 'bus_factor_risk' ? 'severity-high'
                      : contrStatus === 'abandoned'       ? 'severity-critical'
                      : 'severity-unknown';

      var detail = document.getElementById('repo-detail');
      detail.hidden = false;
      detail.innerHTML =
        '<div class="repo-detail-label">Selected Repository</div>'
        + '<div class="card-grid">'
        + '<div class="card" style="grid-column:span 2"><div class="card-label">Name</div>'
        +   '<div class="card-value" style="font-size:0.9rem;word-break:break-all;">' + esc(repo.fullName) + '</div></div>'
        + card('Risk Score',         repo.score != null ? repo.score : '—', '')
        + card('Label',              repo.label || '—',                     cls)
        + (function() {
            var ti      = repo.trendIndicator || {};
            var tiDir   = ti.direction || 'unknown';
            var tiDelta = ti.delta != null ? (ti.delta > 0 ? '+' + ti.delta : String(ti.delta)) : '';
            var tiArrow = tiDir === 'worsening' ? '↑' : tiDir === 'improving' ? '↓' : tiDir === 'stable' ? '→' : '?';
            var tiVal   = tiDir === 'unknown'
                        ? 'Insufficient history'
                        : tiArrow + (tiDelta ? ' ' + tiDelta : '') + ' · ' + (ti.label || '—');
            var tiCls   = tiDir === 'worsening' ? 'severity-high'
                        : tiDir === 'improving' ? 'severity-healthy'
                        : tiDir === 'stable'    ? 'severity-neutral'
                        : 'severity-unknown';
            return card('Trend', tiVal, tiCls);
          })()
        + card('CI Status',          ciLabel,                               ciCls)
        + card('Release Status',     relLabel,                              relCls)
        + card('Latest Release',     repo.latestReleaseName || '—',         '')
        + card('Contributor Health', contrLabel,                            contrCls)
        + card('Last Synced',        syncTime,                              '')
        + '</div>'
        + '<div class="repo-detail-label" style="margin-top:14px;">Why this repo is risky</div>'
        + buildExplanationHtml(exp)
        + '<div class="repo-detail-label" style="margin-top:14px;">Operational Assessment</div>'
        + buildAssessmentHtml(repo)
        + '<div class="repo-detail-label" style="margin-top:14px;">Recommended Actions</div>'
        + buildActionsHtml(repo)
        + '<div class="repo-detail-label" style="margin-top:14px;">Operational Timeline</div>'
        + '<div id="repo-timeline-content"></div>';

      loadRepoTimeline(repo.id);
    }

    function renderReposTable(filtered) {
      var countEl = document.getElementById('projects-count');
      if (countEl) {
        countEl.textContent = _activeFilter === 'All'
          ? filtered.length + ' repo' + (filtered.length !== 1 ? 's' : '')
          : filtered.length + ' / ' + _repos.length;
      }

      if (!filtered.length) {
        document.getElementById('projects-container').innerHTML =
          '<p style="color:var(--text-muted);font-size:0.85rem;">No repositories match this filter.</p>';
        document.getElementById('repo-detail').hidden = true;
        return;
      }

      var rows = filtered.map(function(r) {
        var cls   = labelClass(r.label);
        var score = r.score != null ? r.score : '—';

        var aq       = _attentionMap[r.id];
        var aqLevel  = aq ? aq.attentionLevel  : 'healthy';
        var aqScore  = aq ? aq.attentionScore  : 0;
        var aqCls    = 'aq-badge severity-' + aqLevel;
        var aqReasons = aq ? aq.reasons.slice(0, 2).join('; ') : '';
        var aqHtml   = '<span class="' + aqCls + '">'
          + esc(aqLevel.toUpperCase()) + ' &middot; ' + esc(String(aqScore))
          + '</span>';

        var lastSync = r.lastSyncedAt
          ? new Date(r.lastSyncedAt).toLocaleDateString()
          : '—';

        return '<tr data-id="' + esc(String(r.id)) + '">'
          + '<td><span class="tbl-repo-name">' + esc(r.fullName) + '</span></td>'
          + '<td><span class="status-pill ' + cls + '">' + esc(r.label || 'unknown') + '</span></td>'
          + '<td style="font-family:var(--font-mono);font-size:0.82rem;">' + esc(String(score)) + trendTag(r.trendIndicator) + '</td>'
          + '<td>' + aqHtml + '</td>'
          + '<td><span class="tbl-reasons">' + esc(aqReasons || '—') + '</span></td>'
          + '<td style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted);">' + esc(lastSync) + '</td>'
          + '</tr>';
      }).join('');

      document.getElementById('projects-container').innerHTML =
        '<table>'
        + '<thead><tr><th>Repo</th><th>Label</th><th>Score</th><th>Attention</th><th>Reasons</th><th>Last Sync</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>';

      var tbody = document.querySelector('#projects-container tbody');
      tbody.addEventListener('click', function(e) {
        var tr = e.target.closest('tr');
        if (!tr) return;
        var found = _repos.find(function(r) { return String(r.id) === tr.dataset.id; });
        if (found) selectRepo(found);
      });

      var toSelect = _selectedId !== null
        ? filtered.find(function(r) { return r.id === _selectedId; })
        : null;
      selectRepo(toSelect || filtered[0]);
    }

    function applyFilter() {
      Array.prototype.forEach.call(document.querySelectorAll('.filter-btn'), function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === _activeFilter);
      });
      var filtered = _repos.filter(function(r) {
        if (_activeFilter === 'All')      return true;
        if (_activeFilter === 'At Risk')  return r.label === 'critical' || r.label === 'at-risk';
        if (_activeFilter === 'Healthy')  return r.label === 'healthy';
        return true;
      });
      renderReposTable(filtered);
    }

    // ── Portfolio narrative banner ────────────────────────────────────────────

    function buildPortfolioNarrative(repos, attentionMap) {
      var total = repos.length;
      if (!total) return null;

      var items = Object.keys(attentionMap).map(function(k) { return attentionMap[k]; });
      var levelOrder = ['critical', 'high', 'medium', 'low'];
      var needAttention = items.filter(function(it) { return it.attentionLevel !== 'healthy'; });
      var n = needAttention.length;

      var portfolioLevel = 'healthy';
      for (var i = 0; i < levelOrder.length; i++) {
        var lvl = levelOrder[i];
        if (items.some(function(it) { return it.attentionLevel === lvl; })) {
          portfolioLevel = lvl;
          break;
        }
      }

      var REASON_LABELS = {
        'CI pipeline is failing':        'CI failures',
        'Repository appears abandoned':  'abandoned repos',
        'High risk score':               'high risk score',
        'Elevated risk score':           'elevated risk scores',
        'High bus-factor risk':          'bus-factor risk',
        'Stale release cadence':         'stale releases',
        'Low contributor activity':      'low contributor activity',
        'No releases found':             'no releases',
        'CI status unknown':             'CI status unknown',
        'Release status unknown':        'release status unknown',
        'Contributor status unknown':    'contributor status unknown',
        'No metrics available yet':      'missing metrics',
      };

      var reasonCounts = {};
      needAttention.forEach(function(it) {
        (it.reasons || []).forEach(function(r) {
          var base  = r.replace(/\s*\([^)]*\)\s*$/, '').trim();
          var label = REASON_LABELS[base] || base.toLowerCase();
          reasonCounts[label] = (reasonCounts[label] || 0) + 1;
        });
      });

      var topDrivers = Object.keys(reasonCounts)
        .sort(function(a, b) { return reasonCounts[b] - reasonCounts[a]; })
        .slice(0, 3);

      var levelLabel = portfolioLevel === 'medium'
        ? 'Moderate'
        : portfolioLevel.charAt(0).toUpperCase() + portfolioLevel.slice(1);

      return { level: portfolioLevel, levelLabel: levelLabel, n: n, total: total, topDrivers: topDrivers };
    }

    function renderPortfolioNarrative() {
      var el = document.getElementById('portfolio-narrative');
      if (!el) return;
      if (!_repos.length) { el.innerHTML = ''; return; }

      var data = buildPortfolioNarrative(_repos, _attentionMap);
      if (!data) { el.innerHTML = ''; return; }

      var sevCls    = 'severity-' + data.level;
      var bannerCls = 'narrative-banner narrative-' + data.level;

      var text;
      if (data.level === 'healthy' || data.n === 0) {
        text = 'All <strong>' + esc(String(data.total)) + '</strong> repositories appear operationally healthy.';
      } else {
        var driversHtml = data.topDrivers.length
          ? ' Primary drivers: <span class="narrative-drivers">' + esc(data.topDrivers.join(', ')) + '.</span>'
          : '';
        var concern = data.level === 'critical' ? 'require immediate operational review'
                    : data.level === 'high'     ? 'contain elevated operational risk'
                    :                             'contain moderate operational concerns';
        text = '<strong>' + esc(String(data.n)) + '</strong> repositories ' + concern + '.' + driversHtml;
      }

      el.innerHTML = '<div class="' + bannerCls + '">'
        + '<span class="narrative-badge ' + sevCls + '">' + esc(data.levelLabel.toUpperCase()) + '</span>'
        + '<span class="narrative-text">' + text + '</span>'
        + '</div>';
    }

    function loadRepos() {
      fetch('/api/repos', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.ok === false) {
            document.getElementById('projects-count').textContent = '—';
            document.getElementById('projects-container').innerHTML =
              '<p style="color:var(--text-muted);font-size:0.85rem;">'
              + '<a href="/auth/github" style="color:var(--blue);">Login with GitHub</a>'
              + ' to view and sync repositories.</p>';
            document.getElementById('repo-detail').hidden = true;
            return;
          }
          _repos = d.repos || [];
          if (!_repos.length) {
            document.getElementById('projects-count').textContent = '0 repos';
            document.getElementById('projects-container').innerHTML =
              '<p style="color:var(--text-muted);font-size:0.85rem;">No repositories synced yet — click Sync Now.</p>';
            document.getElementById('repo-detail').hidden = true;
            renderPortfolioNarrative();
            renderPortfolioTrend();
            return;
          }
          applyFilter();
          renderPortfolioNarrative();
          renderPortfolioTrend();

          // Build chart points from risk scores (group by date, take avg)
          var byDate = {};
          _repos.forEach(function(r) {
            if (r.scoredAt == null || r.score == null) return;
            var day = r.scoredAt.slice(0, 10);
            if (!byDate[day]) byDate[day] = { sum: 0, count: 0, at: r.scoredAt };
            byDate[day].sum += r.score;
            byDate[day].count++;
          });
          var points = Object.keys(byDate).sort().map(function(day) {
            return { at: byDate[day].at, score: Math.round(byDate[day].sum / byDate[day].count) };
          });
          renderChart(points);
          renderSparkline(points.slice(-10));

          var countEl = document.getElementById('chart-count');
          if (countEl) countEl.textContent = points.length + ' day' + (points.length !== 1 ? 's' : '');
        })
        .catch(function(e) {
          showError('projects-container', e.message);
          renderChart([]);
        });
    }

    // ── Filter bar wiring ────────────────────────────────────────────────────

    document.querySelector('.filter-bar').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      _activeFilter = btn.dataset.filter;
      applyFilter();
    });

    // ── History ──────────────────────────────────────────────────────────────

    function loadHistory() {
      fetch('/history')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var entries = Array.isArray(data) ? data : [];
          var points = entries
            .filter(function(e) { return e.riskScore != null && e.lastUpdated; })
            .map(function(e) { return { score: e.riskScore, at: e.lastUpdated }; });

          if (!_repos.length) {
            renderChart(points);
            renderSparkline(points.slice(-10));
          }

          var listEl = document.getElementById('history-list');

          // When authenticated repos are present the chart above already shows
          // DB-backed score history. Label this legacy log so it is not confused
          // with the live repository data.
          var sourceNote = _repos.length
            ? '<p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:10px;font-style:italic;">'
              + '&#9432;&#xFE0E; Portfolio demo history (seed data) — not derived from your synced repositories.'
              + '</p>'
            : '';

          if (!entries.length) {
            listEl.innerHTML = sourceNote + '<p style="color:var(--text-muted);font-size:0.85rem;">No snapshots yet.</p>';
            return;
          }
          listEl.innerHTML = sourceNote + entries.slice().reverse().slice(0, 20).map(function(e) {
            var cls = e.alertState === 'Critical' ? 'severity-critical'
                    : e.alertState === 'Monitor'  ? 'severity-medium'
                    : 'severity-healthy';
            return '<div style="display:flex;justify-content:space-between;align-items:center;'
              + 'padding:8px 0;border-bottom:1px solid var(--border);font-size:0.82rem;">'
              + '<span style="color:var(--text-secondary);">'
              +   esc(new Date(e.lastUpdated).toLocaleString()) + '</span>'
              + '<span class="card-badge ' + cls + '">' + esc(e.alertState || 'Normal') + '</span>'
              + '<span style="font-family:var(--font-mono);color:var(--text-primary);">'
              +   'Score: ' + esc(String(e.riskScore)) + '</span>'
              + '</div>';
          }).join('');
        })
        .catch(function(e) {
          showError('history-list', e.message);
          if (!_repos.length) renderChart([]);
        });
    }

    // ── Attention data (merged into repo table rows) ──────────────────────────

    function loadAttentionQueue() {
      fetch('/api/repos/attention', { credentials: 'include' })
        .then(function(r) {
          if (r.status === 401 || r.status === 403) return null;
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          _attentionMap = {};
          (d.attention || []).forEach(function(it) {
            _attentionMap[it.repoId] = it;
          });
          if (_repos.length) applyFilter();
          renderPortfolioNarrative();
        })
        .catch(function() {});
    }

    // ── Initial load + auto-refresh ──────────────────────────────────────────

    function refresh() {
      loadSummary();
      loadRepos();
      loadAttentionQueue();
      loadHistory();
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
