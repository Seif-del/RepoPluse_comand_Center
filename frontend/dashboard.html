<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoPulse Dashboard</title>
  <style>
    /* ── Design tokens ────────────────────────────────────────────────────── */
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --surface-2:    #f7f8fa;
      --border:       #e2e5ea;
      --border-focus: #3b82f6;

      --text-primary:   #0f1117;
      --text-secondary: #5a6272;
      --text-muted:     #9aa1b1;

      --blue:    #3b82f6;
      --green:   #22c55e;
      --red:     #ef4444;
      --orange:  #f97316;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0d0f14;
        --surface:      #161b24;
        --surface-2:    #1c2230;
        --border:       #2a3144;
        --border-focus: #3b82f6;

        --text-primary:   #e8eaf0;
        --text-secondary: #8b95a8;
        --text-muted:     #4d576a;

        --shadow-sm: 0 1px 3px rgba(0,0,0,.4),  0 1px 2px rgba(0,0,0,.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.3);
      }
    }

    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ─────────────────────────────────────────────────────────────── */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Top bar ──────────────────────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0 32px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      background: var(--blue);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo svg { display: block; }

    .topbar-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .topbar-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .topbar-spacer { flex: 1; }

    .pulse-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Page layout ──────────────────────────────────────────────────────── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 20px 12px;
    }

    .page-header {
      margin-bottom: 6px;
    }

    .page-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .page-header p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Section ──────────────────────────────────────────────────────────── */
    .section {
      margin-bottom: 8px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .section-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Card grid ────────────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 6px;
    }

    /* Summary bar: exactly 7 equal columns, full width */
    #summary-cards {
      grid-template-columns: repeat(7, 1fr);
    }

    @media (max-width: 900px) {
      #summary-cards { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 560px) {
      #summary-cards { grid-template-columns: repeat(2, 1fr); }
    }

    /* Drill-down: 4 equal metadata columns, action card always full-width */
    #repo-detail .card-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    #repo-detail .card-grid .card:last-child {
      grid-column: 1 / -1;
    }

    @media (max-width: 700px) {
      #repo-detail .card-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .card-value {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
      word-break: break-word;
    }

    /* Status-aware value colors */
    .card-value.at-risk,
    .card-value.critical,
    .card-value.worsening { color: var(--red); }

    .card-value.healthy,
    .card-value.improving  { color: var(--green); }

    .card-value.monitor    { color: var(--orange); }

    /* Risk score interpretation sub-line */
    .card-sub {
      font-size: 0.72rem;
      font-weight: 600;
      margin-top: 3px;
      line-height: 1.1;
    }

    .card-sub.healthy { color: var(--green);  }
    .card-sub.at-risk { color: var(--red);    }
    .card-sub.monitor { color: var(--orange); }

    /* ── Risk Score card — dominant KPI ──────────────────────────────────── */
    .card--risk                { border-width: 2px; }
    .card--risk.healthy        { background: rgba(34,197,94,.06);  border-color: rgba(34,197,94,.35);  }
    .card--risk.monitor        { background: rgba(249,115,22,.07); border-color: rgba(249,115,22,.35); }
    .card--risk.at-risk        { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.35);  }
    .card--risk .card-value    { font-size: 1.4rem; }

    /* Status badge pill on cards */
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .card-badge.at-risk, .card-badge.critical, .card-badge.worsening {
      background: rgba(239,68,68,.12);
      color: var(--red);
    }

    .card-badge.healthy, .card-badge.improving {
      background: rgba(34,197,94,.12);
      color: var(--green);
    }

    .card-badge.monitor {
      background: rgba(249,115,22,.12);
      color: var(--orange);
    }

    .card-badge.normal, .card-badge.stable {
      background: var(--surface-2);
      color: var(--text-secondary);
    }

    .card-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Panel (shared surface for chart / table / history) ───────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-head {
      padding: 8px 16px 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-head h2 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .panel-head .panel-count {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 8px;
    }

    .panel-body { padding: 10px; }

    /* ── Chart ────────────────────────────────────────────────────────────── */
    .chart-svg {
      display: block;
      width: 100%;
      height: 180px;
    }

    .chart-axis-label {
      font-size: 10px;
      fill: var(--text-muted);
      font-family: var(--font-mono);
    }

    .chart-line {
      fill: none;
      stroke: var(--blue);
      stroke-width: 2.5;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .chart-area { fill: url(#areaGradient); }

    .chart-dot {
      fill: var(--blue);
      stroke: var(--surface);
      stroke-width: 2;
    }

    .chart-dot.risk-high  { fill: var(--red); }
    .chart-dot-latest     { stroke-width: 2.5; }
    .chart-dot-ring       { fill: none; stroke-width: 1.5; opacity: 0.3; }
    .chart-trend-arrow    { font-size: 14px; font-weight: 700; }

    .chart-gridline {
      stroke: var(--border);
      stroke-width: 1;
    }

    /* ── Projects table ───────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      text-align: left;
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      padding: 0 10px 5px;
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child { padding-left: 0; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody tr.row-selected { background: rgba(59,130,246,.08); }
    tbody tr.row-latest {
      background: rgba(59,130,246,.05);
      border-left: 3px solid var(--blue);
    }

    .delta      { font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .delta.up   { color: var(--red); }
    .delta.down { color: var(--green); }
    .delta.flat { color: var(--text-muted); }

    tbody td {
      padding: 6px 10px;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    tbody td:first-child {
      padding-left: 0;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .status-pill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.healthy  { background: rgba(34,197,94,.12);  color: var(--green); }
    .status-pill.at-risk  { background: rgba(239,68,68,.12);  color: var(--red);   }

    /* ── History list ─────────────────────────────────────────────────────── */
    .history-list {
      list-style: none;
    }

    .history-list li {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-list li:last-child { border-bottom: none; }

    .history-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-field-label {
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .history-field-value {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-primary);
      font-family: var(--font-mono);
    }

    /* ── Filter bar ──────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .filter-btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .filter-btn:hover {
      border-color: var(--border-focus);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── Repo detail ─────────────────────────────────────────────────────── */
    .repo-detail {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .repo-detail-label {
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .action-checklist {
      margin: 6px 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .action-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 0.78rem;
      line-height: 1.35;
      color: var(--text-secondary);
    }
    .action-checklist li::before {
      content: '☐';
      flex-shrink: 0;
      font-size: 0.8rem;
      margin-top: 0.05em;
      color: var(--text-muted);
    }
    .action-checklist.at-risk li::before { color: var(--red); }
    .action-checklist.healthy li::before { color: var(--green); }

    /* ── Sparkline ───────────────────────────────────────────────────────── */
    .sparkline-svg {
      display: block;
      width: 100%;
      height: 24px;
      margin-bottom: 4px;
    }

    /* ── Alert banner ────────────────────────────────────────────────────── */
    .alert-banner {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-left: 4px solid var(--red);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .alert-banner[hidden] { display: none; }

    .alert-banner-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--red);
      margin-top: 1px;
    }

    .alert-banner-body { flex: 1; min-width: 0; }

    .alert-banner-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 3px;
    }

    .alert-banner-detail {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .alert-banner-detail strong { color: var(--text-primary); }

    /* ── Error ────────────────────────────────────────────────────────────── */
    .error-msg {
      font-size: 0.82rem;
      color: var(--red);
      padding: 8px 0;
    }

    /* ── Executive insight strip ─────────────────────────────────────────── */
    .insight-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      border-left: 4px solid;
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.4;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .insight-strip[hidden] { display: none; }

    .insight-strip.healthy {
      background: rgba(34,197,94,.06);
      border-color: var(--green);
      color: var(--text-primary);
    }

    .insight-strip.monitor {
      background: rgba(249,115,22,.06);
      border-color: var(--orange);
      color: var(--text-primary);
    }

    .insight-strip.at-risk {
      background: rgba(239,68,68,.06);
      border-color: var(--red);
      color: var(--text-primary);
    }

    .insight-strip-icon {
      flex-shrink: 0;
      font-size: 1rem;
      line-height: 1;
    }

    /* ── Reason cell in table ───────────────────────────────────────────── */
    .reason-cell {
      font-size: 0.78rem;
      color: var(--text-secondary);
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reason-cell.no-signals {
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Risk drivers bullet list in drill-down ──────────────────────────── */
    .risk-drivers-list {
      margin: 6px 0 0;
      padding: 0 0 0 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .risk-drivers-list li {
      font-size: 0.78rem;
      line-height: 1.35;
      color: var(--text-secondary);
    }

    /* ── Chart insight sentence ──────────────────────────────────────────── */
    .chart-insight {
      font-size: 0.76rem;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 6px;
      padding: 0 2px;
      min-height: 1em;
    }

    /* ── Internal table scrolling ─────────────────────────────────────────── */
    #projects-container {
      max-height: 300px;
      overflow-y: auto;
    }

    #projects-container thead th,
    #history-list thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    #history-list {
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" fill="white"/>
        <circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
      </svg>
    </div>
    <span class="topbar-title">RepoPulse</span>
    <span class="topbar-subtitle">Command Center</span>
    <div class="topbar-spacer"></div>
    <div class="pulse-indicator">
      <div class="pulse-dot"></div>
      Live · 3s
    </div>
  </header>

  <div class="page">

    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Real-time health and risk overview across all tracked repositories.</p>
    </div>

    <!-- Alert banner -->
    <div id="alert-banner" class="alert-banner" hidden>
      <svg class="alert-banner-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M10 2L2 17h16L10 2z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
        <path d="M10 8v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        <circle cx="10" cy="14.5" r="0.75" fill="currentColor"/>
      </svg>
      <div class="alert-banner-body">
        <div id="alert-banner-title" class="alert-banner-title"></div>
        <div id="alert-banner-detail" class="alert-banner-detail"></div>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Summary</span>
        <div class="section-divider"></div>
      </div>
      <div id="summary-cards" class="card-grid">
        <div class="card"><div class="card-label">Loading</div><div class="card-value">—</div></div>
      </div>
    </div>

    <!-- Executive insight -->
    <div id="insight-strip" class="insight-strip" hidden>
      <span class="insight-strip-icon" id="insight-icon"></span>
      <span id="insight-text"></span>
    </div>

    <!-- Repository Status -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Projects</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Repository Health</h2>
          <span id="projects-count" class="panel-count">—</span>
        </div>
        <div class="panel-body">
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="At Risk">At Risk</button>
            <button class="filter-btn" data-filter="Healthy">Healthy</button>
          </div>
          <div id="projects-container"><p class="error-msg">Loading…</p></div>
          <div id="repo-detail" class="repo-detail" hidden></div>
        </div>
      </div>
    </div>

    <!-- Risk Score History -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Risk Score Over Time</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Risk Trend</h2>
          <span id="chart-count" class="panel-count">— snapshots</span>
        </div>
        <div class="panel-body" style="padding: 8px 10px 4px;">
          <p id="chart-insight" class="chart-insight"></p>
          <svg id="history-chart" class="chart-svg" aria-label="Risk score history chart">
            <defs>
              <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <text x="50%" y="50%" text-anchor="middle" class="chart-axis-label">Loading…</text>
          </svg>
        </div>
      </div>
    </div>

    <!-- Snapshot Log -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Snapshot Log</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Recent Risk Snapshots</h2>
        </div>
        <div class="panel-body">
          <svg id="history-sparkline" class="sparkline-svg" aria-label="Risk score sparkline — last 10 snapshots"></svg>
          <div id="history-list"><p class="error-msg">Loading…</p></div>
        </div>
      </div>
    </div>

  </div><!-- /page -->

  <script>
    // ── Helpers ─────────────────────────────────────────────────────────────

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function colorClass(field, value) {
      if (typeof value !== 'string') return '';
      var v = value.toLowerCase().replace(/\s+/g, '-');
      if (field === 'systemStatus') return v === 'at-risk' ? 'at-risk' : 'healthy';
      if (field === 'alertState')   return v;
      if (field === 'trend')        return v;
      return '';
    }

    function badgeFields() {
      return { systemStatus: true, alertState: true, trend: true };
    }

    function card(label, value, field) {
      var cls = colorClass(field, value);
      var useBadge = badgeFields()[field] && cls;
      var valueHtml = useBadge
        ? '<span class="card-badge ' + cls + '">' + esc(String(value)) + '</span>'
        : '<div class="card-value' + (cls ? ' ' + cls : '') + '">' + esc(String(value)) + '</div>';
      return '<div class="card">'
        + '<div class="card-label">' + esc(label) + '</div>'
        + valueHtml
        + '</div>';
    }

    function riskScoreCard(score, trend) {
      var label, cls;
      if (score <= 20)      { label = 'Low Risk';      cls = 'healthy'; }
      else if (score <= 50) { label = 'Moderate Risk'; cls = 'monitor'; }
      else                  { label = 'High Risk';     cls = 'at-risk'; }
      var arrow = trend === 'Improving' ? '↓' : trend === 'Worsening' ? '↑' : '→';
      return '<div class="card card--risk ' + cls + '">'
        + '<div class="card-label">Risk Score</div>'
        + '<div class="card-value ' + cls + '">' + esc(String(score)) + '%</div>'
        + '<div class="card-sub ' + cls + '">' + esc(label) + ' ' + arrow + '</div>'
        + '</div>';
    }

    function renderInsightStrip(d) {
      var strip = document.getElementById('insight-strip');
      var textEl = document.getElementById('insight-text');
      var iconEl = document.getElementById('insight-icon');
      if (!strip || !textEl) return;

      var riskCls, riskLabel, icon;
      if (d.riskScore <= 20)      { riskCls = 'healthy'; riskLabel = 'Low';      icon = '✓'; }
      else if (d.riskScore <= 50) { riskCls = 'monitor'; riskLabel = 'Moderate'; icon = '⚠'; }
      else                        { riskCls = 'at-risk'; riskLabel = 'High';     icon = '✕'; }

      var atRisk = d.atRiskProjects;
      var total  = d.totalProjects;
      var actionText = atRisk === 0
        ? 'All ' + total + ' repositories are healthy.'
        : atRisk + ' of ' + total + ' repositor' + (total === 1 ? 'y requires' : 'ies require') + ' attention.';

      strip.className = 'insight-strip ' + riskCls;
      strip.hidden = false;
      iconEl.textContent = icon;
      textEl.textContent = 'Current portfolio risk is ' + riskLabel
        + ' at ' + d.riskScore + '%. ' + actionText;
    }

    function showError(id, msg) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = '<p class="error-msg">Failed to load: ' + esc(String(msg)) + '</p>';
    }

    // ── Chart ────────────────────────────────────────────────────────────────

    function renderChart(history) {
      var svg = document.getElementById('history-chart');
      var W = svg.clientWidth  || 880;
      var H = svg.clientHeight || 130;
      var PAD = { top: 20, right: 24, bottom: 36, left: 40 };
      var innerW = W - PAD.left - PAD.right;
      var innerH = H - PAD.top  - PAD.bottom;

      var countEl = document.getElementById('chart-count');
      if (countEl) countEl.textContent = history.length + ' snapshot' + (history.length !== 1 ? 's' : '');

      if (!history.length) {
        svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" class="chart-axis-label">No data yet</text>';
        return;
      }

      var yMin = 0, yMax = 100;

      function xPos(i) {
        return PAD.left + (history.length === 1 ? innerW / 2 : i * (innerW / (history.length - 1)));
      }
      function yPos(v) {
        return PAD.top + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
      }
      function shortDate(iso) {
        var d = new Date(iso);
        return (d.getMonth() + 1) + '/' + d.getDate()
          + ' ' + String(d.getHours()).padStart(2,'0')
          + ':' + String(d.getMinutes()).padStart(2,'0');
      }

      var p = [];

      // Gradient def
      p.push('<defs>'
        + '<linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">'
        + '<stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.2"/>'
        + '<stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>'
        + '</linearGradient></defs>');

      // Gridlines + Y labels
      [0, 25, 50, 75, 100].forEach(function(v) {
        var y = yPos(v);
        p.push('<line class="chart-gridline"'
          + ' x1="' + PAD.left + '" y1="' + y + '"'
          + ' x2="' + (PAD.left + innerW) + '" y2="' + y + '"/>');
        p.push('<text class="chart-axis-label"'
          + ' x="' + (PAD.left - 8) + '" y="' + (y + 4) + '"'
          + ' text-anchor="end">' + v + '</text>');
      });

      // X labels — first and last
      [[0,'start'], [history.length - 1, 'end']].forEach(function(pair) {
        var i = pair[0], anchor = pair[1];
        if (!history[i]) return;
        p.push('<text class="chart-axis-label"'
          + ' x="' + xPos(i) + '" y="' + (H - 8) + '"'
          + ' text-anchor="' + anchor + '">'
          + esc(shortDate(history[i].lastUpdated)) + '</text>');
      });

      // Area
      var aD = 'M ' + xPos(0) + ' ' + yPos(history[0].riskScore);
      history.forEach(function(h, i) { if (i > 0) aD += ' L ' + xPos(i) + ' ' + yPos(h.riskScore); });
      aD += ' L ' + xPos(history.length - 1) + ' ' + yPos(yMin)
          + ' L ' + xPos(0) + ' ' + yPos(yMin) + ' Z';
      p.push('<path class="chart-area" d="' + aD + '"/>');

      // Line
      var lD = 'M ' + xPos(0) + ' ' + yPos(history[0].riskScore);
      history.forEach(function(h, i) { if (i > 0) lD += ' L ' + xPos(i) + ' ' + yPos(h.riskScore); });
      p.push('<path class="chart-line" d="' + lD + '"/>');

      // Trend direction from last two points
      var trendDir = 'stable';
      if (history.length >= 2) {
        var delta = history[history.length - 1].riskScore - history[history.length - 2].riskScore;
        if (delta > 2)       trendDir = 'worsening';
        else if (delta < -2) trendDir = 'improving';
      }
      var trendArrow = trendDir === 'worsening' ? '↑' : trendDir === 'improving' ? '↓' : '→';
      var trendFill  = trendDir === 'worsening' ? 'var(--red)' : trendDir === 'improving' ? 'var(--green)' : 'var(--text-muted)';

      // Trend arrow — top-right corner
      p.push('<text class="chart-trend-arrow"'
        + ' x="' + (PAD.left + innerW) + '" y="' + (PAD.top - 4) + '"'
        + ' text-anchor="end" fill="' + trendFill + '">' + trendArrow + '</text>');

      // Dots — latest gets larger radius + outer ring
      history.forEach(function(h, i) {
        var isLatest  = i === history.length - 1;
        var isHighRisk = h.riskScore >= 50;
        var dotStroke = isHighRisk ? 'var(--red)' : 'var(--blue)';
        var cls = 'chart-dot' + (isHighRisk ? ' risk-high' : '') + (isLatest ? ' chart-dot-latest' : '');
        var r   = isLatest ? 6 : 4.5;
        if (isLatest) {
          p.push('<circle class="chart-dot-ring"'
            + ' cx="' + xPos(i) + '" cy="' + yPos(h.riskScore) + '" r="10"'
            + ' stroke="' + dotStroke + '"/>');
        }
        p.push('<circle class="' + cls + '"'
          + ' cx="' + xPos(i) + '" cy="' + yPos(h.riskScore) + '" r="' + r + '">'
          + '<title>' + esc(shortDate(h.lastUpdated)) + ' — ' + h.riskScore + '%</title>'
          + '</circle>');
      });

      svg.innerHTML = p.join('');
    }

    // ── Sparkline ────────────────────────────────────────────────────────────

    function renderSparkline(data) {
      var svg = document.getElementById('history-sparkline');
      if (!svg) return;
      if (!data.length) { svg.innerHTML = ''; return; }
      var W      = svg.clientWidth || 600;
      var H      = 24;
      var PAD    = 4;
      var ARROW  = 16; // reserve px on right for trend arrow
      var innerW = W - PAD * 2 - ARROW;
      var innerH = H - PAD * 2;

      function xPos(i) {
        return PAD + (data.length === 1 ? innerW / 2 : i * (innerW / (data.length - 1)));
      }
      function yPos(v) {
        return PAD + innerH - (v / 100) * innerH;
      }

      // Trend direction across visible data range
      var trendDir = 'stable';
      if (data.length >= 2) {
        var delta = data[data.length - 1].riskScore - data[0].riskScore;
        if (delta > 2)       trendDir = 'worsening';
        else if (delta < -2) trendDir = 'improving';
      }
      var trendArrow = trendDir === 'worsening' ? '↑' : trendDir === 'improving' ? '↓' : '→';
      var trendFill  = trendDir === 'worsening' ? 'var(--red)' : trendDir === 'improving' ? 'var(--green)' : 'var(--text-muted)';

      var pts = data.map(function(h, i) {
        return xPos(i) + ',' + yPos(h.riskScore);
      }).join(' ');

      var last     = data[data.length - 1];
      var lastX    = xPos(data.length - 1);
      var lastY    = yPos(last.riskScore);
      var dotColor = last.riskScore >= 50 ? 'var(--red)' : 'var(--blue)';

      svg.innerHTML =
        '<polyline points="' + pts + '"'
        + ' fill="none" stroke="var(--blue)" stroke-width="2"'
        + ' stroke-linejoin="round" stroke-linecap="round"/>'
        + '<circle cx="' + lastX + '" cy="' + lastY + '" r="6"'
        + ' fill="none" stroke="' + dotColor + '" stroke-width="1" opacity="0.3"/>'
        + '<circle cx="' + lastX + '" cy="' + lastY + '" r="3.5"'
        + ' fill="' + dotColor + '" stroke="var(--surface)" stroke-width="1.5">'
        + '<title>Latest: ' + last.riskScore + '%</title>'
        + '</circle>'
        + '<text x="' + (W - PAD) + '" y="' + (H / 2 + 4) + '"'
        + ' text-anchor="end" font-size="11" font-weight="700" fill="' + trendFill + '">'
        + trendArrow + '</text>';
    }

    // ── Reason formatting ────────────────────────────────────────────────────

    function formatReasons(reasons) {
      if (!reasons || !reasons.length) return null;
      if (reasons.length === 1) return reasons[0];
      return reasons[0] + ' +' + (reasons.length - 1) + ' more';
    }

    // ── Chart insight sentence ───────────────────────────────────────────────

    function renderChartInsight(history) {
      var el = document.getElementById('chart-insight');
      if (!el) return;
      if (!history || history.length < 2) {
        el.textContent = 'Not enough history yet to describe risk movement.';
        return;
      }
      var sorted = history.slice().sort(function(a, b) {
        return new Date(a.lastUpdated) - new Date(b.lastUpdated);
      });
      var oldest = sorted[0].riskScore;
      var latest = sorted[sorted.length - 1].riskScore;
      var delta  = latest - oldest;
      var level  = latest <= 20 ? 'Low' : latest <= 50 ? 'Moderate' : 'High';
      var movement;
      if (delta > 0) {
        movement = 'increased by ' + delta + ' point' + (delta === 1 ? '' : 's');
      } else if (delta < 0) {
        movement = 'decreased by ' + Math.abs(delta) + ' point' + (Math.abs(delta) === 1 ? '' : 's');
      } else {
        movement = 'remained stable';
      }
      var suffix = delta === 0
        ? ' at ' + level + ' (' + latest + '%) across the latest snapshots.'
        : ' to ' + level + ' (' + latest + '%) over the latest snapshots.';
      el.textContent = 'Risk ' + movement + suffix;
    }

    // ── Data fetchers ────────────────────────────────────────────────────────

    function updateAlertBanner(d) {
      var isCritical  = d.alertState === 'Critical';
      var isWorsening = d.trend === 'Worsening';
      var banner      = document.getElementById('alert-banner');

      if (!isCritical && !isWorsening) {
        banner.hidden = true;
        return;
      }

      var title = isCritical ? 'Critical Alert — Immediate Attention Required'
                             : 'Risk Trending Up — Monitor Closely';

      var reasons = [];
      if (isCritical)  reasons.push('alert state is <strong>Critical</strong>');
      if (isWorsening) reasons.push('trend is <strong>Worsening</strong>');

      var detail = 'System status: <strong>' + esc(d.systemStatus) + '</strong>. '
        + 'Risk score: <strong>' + esc(String(d.riskScore)) + '%</strong>. '
        + reasons.join(' and ') + '.';

      document.getElementById('alert-banner-title').textContent  = title;
      document.getElementById('alert-banner-detail').innerHTML   = detail;
      banner.hidden = false;
    }

    function loadSummary() {
      fetch('/summary')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          document.getElementById('summary-cards').innerHTML = [
            card('Total Repos',    d.totalProjects,   'totalProjects'),
            card('Healthy',        d.healthyProjects,  'healthyProjects'),
            card('At Risk',        d.atRiskProjects,   'atRiskProjects'),
            riskScoreCard(d.riskScore, d.trend),
            card('System Status',  d.systemStatus,     'systemStatus'),
            card('Alert State',    d.alertState,       'alertState'),
            card('Trend',          d.trend,            'trend'),
          ].join('');
          renderInsightStrip(d);
          updateAlertBanner(d);
        })
        .catch(function(e) { showError('summary-cards', e.message); });
    }

    var _projects = [];
    var _selectedId = null;
    var _activeFilter = 'All';

    function selectRepo(project) {
      _selectedId = project.id;

      // Highlight selected row (only visible rows are in DOM)
      var tbody = document.querySelector('#projects-container tbody');
      if (tbody) {
        Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr) {
          tr.classList.toggle('row-selected', tr.dataset.id === String(project.id));
        });
      }

      // Render static panel content immediately
      var isAtRisk   = project.status === 'At Risk';
      var badgeClass = isAtRisk ? 'at-risk' : 'healthy';
      var explanation = isAtRisk
        ? 'This repository has active risk signals. Left unresolved, these may delay releases or increase operational risk.'
        : 'No issues detected. This repository is operating within expected health thresholds.';

      var steps = isAtRisk
        ? [ 'Triage open issues and identify anything blocking a release',
            'Review recent commits for regressions or stalled work',
            'Verify CI is passing and no deployments are blocked',
            'Assign a clear owner to the issue backlog if unaddressed' ]
        : [ 'Confirm the last deployment completed successfully',
            'Verify open issues are being reviewed and not accumulating',
            'Check that branch protection and code review rules remain enabled' ];

      var listItems = steps.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('');

      var reasons = project.reasons || [];
      var driversHtml;
      if (reasons.length) {
        driversHtml = '<ul class="risk-drivers-list">'
          + reasons.map(function(r) { return '<li>' + esc(r) + '</li>'; }).join('')
          + '</ul>';
      } else if (isAtRisk) {
        driversHtml = '<p style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;">Risk signals detected.</p>';
      } else {
        driversHtml = '<p style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;">No risk signals detected.</p>';
      }

      var detail = document.getElementById('repo-detail');
      detail.hidden = false;
      detail.innerHTML =
        '<div class="repo-detail-label">Selected Repository</div>'
        + '<div class="card-grid">'
        + '<div class="card"><div class="card-label">Name</div><div class="card-value" style="font-size:0.9rem;word-break:break-all;">' + esc(project.name) + '</div></div>'
        + '<div class="card"><div class="card-label">ID</div><div class="card-value">' + esc(String(project.id)) + '</div></div>'
        + '<div class="card"><div class="card-label">Status</div><div class="card-value"><span class="card-badge ' + badgeClass + '">' + esc(project.status) + '</span></div></div>'
        + '<div class="card"><div class="card-label">Assessment</div><div class="card-value" style="font-size:0.82rem;font-weight:500;">' + esc(explanation) + '</div></div>'
        + '<div class="card" style="grid-column: 1 / -1;"><div class="card-label">Risk Drivers</div>' + driversHtml + '</div>'
        + '<div class="card"><div class="card-label">Recommended Actions</div>'
        + '<ul class="action-checklist ' + badgeClass + '">' + listItems + '</ul></div>'
        + '</div>';
    }

    function renderProjectsTable(filtered) {
      var countEl = document.getElementById('projects-count');
      if (countEl) {
        countEl.textContent = _activeFilter === 'All'
          ? filtered.length + ' repo' + (filtered.length !== 1 ? 's' : '')
          : filtered.length + ' / ' + _projects.length + ' repo' + (_projects.length !== 1 ? 's' : '');
      }

      if (!filtered.length) {
        document.getElementById('projects-container').innerHTML =
          '<p style="color:var(--text-muted);font-size:0.85rem;">No repositories match the current filter.</p>';
        _selectedId = null;
        var detail = document.getElementById('repo-detail');
        detail.hidden = false;
        detail.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No repositories match the current filter.</p>';
        return;
      }

      var sorted = filtered.slice().sort(function(a, b) {
        return (a.status === 'At Risk' ? 0 : 1) - (b.status === 'At Risk' ? 0 : 1);
      });

      var rows = sorted.map(function(p) {
        var pillClass  = p.status === 'At Risk' ? 'at-risk' : 'healthy';
        var hasReasons = p.reasons && p.reasons.length > 0;
        var reasonCell;
        if (hasReasons) {
          reasonCell = '<td class="reason-cell">' + esc(formatReasons(p.reasons)) + '</td>';
        } else if (p.status === 'At Risk') {
          reasonCell = '<td class="reason-cell">' + esc('Risk signals detected') + '</td>';
        } else {
          reasonCell = '<td class="reason-cell no-signals">No risk signals</td>';
        }
        return '<tr data-id="' + esc(String(p.id)) + '">'
          + '<td>' + esc(String(p.id)) + '</td>'
          + '<td>' + esc(p.name) + '</td>'
          + '<td><span class="status-pill ' + pillClass + '">' + esc(p.status) + '</span></td>'
          + reasonCell
          + '</tr>';
      }).join('');

      document.getElementById('projects-container').innerHTML =
        '<table>'
        + '<thead><tr><th>ID</th><th>Name</th><th>Status</th><th>Reason</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>';

      var tbody = document.querySelector('#projects-container tbody');
      tbody.addEventListener('click', function(e) {
        var tr = e.target.closest('tr');
        if (!tr) return;
        var project = _projects.find(function(p) { return String(p.id) === tr.dataset.id; });
        if (project) selectRepo(project);
      });

      // Restore selection if still visible, else auto-select first visible
      var toSelect = _selectedId !== null
        ? filtered.find(function(p) { return p.id === _selectedId; })
        : null;
      selectRepo(toSelect || filtered[0]);
    }

    function applyFilter() {
      Array.prototype.forEach.call(document.querySelectorAll('.filter-btn'), function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === _activeFilter);
      });
      var filtered = _activeFilter === 'All'
        ? _projects
        : _projects.filter(function(p) { return p.status === _activeFilter; });
      renderProjectsTable(filtered);
    }

    function loadProjects() {
      fetch('/projects')
        .then(function(r) { return r.json(); })
        .then(function(projects) {
          _projects = projects;
          if (!projects.length) {
            document.getElementById('projects-count').textContent = '0 repos';
            document.getElementById('projects-container').innerHTML =
              '<p style="color:var(--text-muted);font-size:0.85rem;">No projects found.</p>';
            document.getElementById('repo-detail').hidden = true;
            return;
          }
          applyFilter();
        })
        .catch(function(e) { showError('projects-container', e.message); });
    }

    function loadHistory() {
      fetch('/history')
        .then(function(r) { return r.json(); })
        .then(function(history) {
          renderChart(history);
          renderChartInsight(history);

          if (!history.length) {
            document.getElementById('history-list').innerHTML =
              '<p style="color:var(--text-muted);font-size:0.85rem;">No history recorded yet.</p>';
            renderSparkline([]);
            return;
          }

          var sorted = history.slice().sort(function(a, b) {
            return new Date(b.lastUpdated) - new Date(a.lastUpdated);
          });
          var recent5 = sorted.slice(0, 5);
          renderSparkline(recent5.slice().reverse());
          var rows = recent5.map(function(h, i) {
            var prev = recent5[i + 1];
            var deltaCell;
            if (!prev) {
              deltaCell = '<td class="delta flat">—</td>';
            } else {
              var d = h.riskScore - prev.riskScore;
              if (d > 0)      deltaCell = '<td class="delta up">↑ +' + d + '</td>';
              else if (d < 0) deltaCell = '<td class="delta down">↓ ' + d + '</td>';
              else            deltaCell = '<td class="delta flat">→ 0</td>';
            }
            return '<tr' + (i === 0 ? ' class="row-latest"' : '') + '>'
              + '<td>' + esc(h.lastUpdated) + '</td>'
              + '<td>' + esc(String(h.totalProjects)) + '</td>'
              + '<td>' + esc(String(h.healthyProjects)) + '</td>'
              + '<td>' + esc(String(h.atRiskProjects)) + '</td>'
              + '<td>' + esc(String(h.riskScore)) + '%</td>'
              + deltaCell
              + '<td><span class="card-badge ' + colorClass('trend', h.trend) + '">' + esc(h.trend) + '</span></td>'
              + '<td><span class="card-badge ' + colorClass('alertState', h.alertState) + '">' + esc(h.alertState) + '</span></td>'
              + '</tr>';
          }).join('');
          document.getElementById('history-list').innerHTML =
            '<table>'
            + '<thead><tr>'
            + '<th>Timestamp</th><th>Total</th><th>Healthy</th>'
            + '<th>At Risk</th><th>Risk Score</th><th>Δ Score</th><th>Trend</th><th>Alert State</th>'
            + '</tr></thead>'
            + '<tbody>' + rows + '</tbody>'
            + '</table>';
        })
        .catch(function(e) {
          document.getElementById('history-list').innerHTML =
            '<p class="error-msg">Failed to load: ' + esc(String(e.message)) + '</p>';
        });
    }

    // ── Filter bar wiring ────────────────────────────────────────────────────

    document.querySelector('.filter-bar').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      _activeFilter = btn.dataset.filter;
      applyFilter();
    });

    // ── Initial load + auto-refresh ──────────────────────────────────────────

    function refresh() {
      loadSummary();
      loadProjects();
      loadHistory();
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
