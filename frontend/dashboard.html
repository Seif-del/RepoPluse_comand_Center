<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoPulse Dashboard</title>
  <style>
    /* ── Design tokens ────────────────────────────────────────────────────── */
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --surface-2:    #f7f8fa;
      --border:       #e2e5ea;
      --border-focus: #3b82f6;

      --text-primary:   #0f1117;
      --text-secondary: #5a6272;
      --text-muted:     #9aa1b1;

      --blue:    #3b82f6;
      --green:   #22c55e;
      --red:     #ef4444;
      --orange:  #f97316;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0d0f14;
        --surface:      #161b24;
        --surface-2:    #1c2230;
        --border:       #2a3144;
        --border-focus: #3b82f6;

        --text-primary:   #e8eaf0;
        --text-secondary: #8b95a8;
        --text-muted:     #4d576a;

        --shadow-sm: 0 1px 3px rgba(0,0,0,.4),  0 1px 2px rgba(0,0,0,.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.3);
      }
    }

    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ─────────────────────────────────────────────────────────────── */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Top bar ──────────────────────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      background: var(--blue);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo svg { display: block; }

    .topbar-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .topbar-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .topbar-spacer { flex: 1; }

    .pulse-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Page layout ──────────────────────────────────────────────────────── */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .page-header p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Section ──────────────────────────────────────────────────────────── */
    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .section-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Card grid ────────────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .card-label {
      font-size: 0.67rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
      word-break: break-word;
    }

    /* Status-aware value colors */
    .card-value.at-risk,
    .card-value.critical,
    .card-value.worsening { color: var(--red); }

    .card-value.healthy,
    .card-value.improving  { color: var(--green); }

    .card-value.monitor    { color: var(--orange); }

    /* Status badge pill on cards */
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .card-badge.at-risk, .card-badge.critical, .card-badge.worsening {
      background: rgba(239,68,68,.12);
      color: var(--red);
    }

    .card-badge.healthy, .card-badge.improving {
      background: rgba(34,197,94,.12);
      color: var(--green);
    }

    .card-badge.monitor {
      background: rgba(249,115,22,.12);
      color: var(--orange);
    }

    .card-badge.normal, .card-badge.stable {
      background: var(--surface-2);
      color: var(--text-secondary);
    }

    .card-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Panel (shared surface for chart / table / history) ───────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-head h2 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .panel-head .panel-count {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 8px;
    }

    .panel-body { padding: 20px; }

    /* ── Chart ────────────────────────────────────────────────────────────── */
    .chart-svg {
      display: block;
      width: 100%;
      height: 200px;
    }

    .chart-axis-label {
      font-size: 10px;
      fill: var(--text-muted);
      font-family: var(--font-mono);
    }

    .chart-line {
      fill: none;
      stroke: var(--blue);
      stroke-width: 2.5;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .chart-area { fill: url(#areaGradient); }

    .chart-dot {
      fill: var(--blue);
      stroke: var(--surface);
      stroke-width: 2;
    }

    .chart-dot.risk-high { fill: var(--red); }

    .chart-gridline {
      stroke: var(--border);
      stroke-width: 1;
    }

    /* ── Projects table ───────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      text-align: left;
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child { padding-left: 0; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody tr.row-selected { background: rgba(59,130,246,.08); }
    tbody tr.row-latest {
      background: rgba(59,130,246,.05);
      border-left: 3px solid var(--blue);
    }

    tbody td {
      padding: 11px 12px;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    tbody td:first-child {
      padding-left: 0;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .status-pill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.healthy  { background: rgba(34,197,94,.12);  color: var(--green); }
    .status-pill.at-risk  { background: rgba(239,68,68,.12);  color: var(--red);   }

    /* ── History list ─────────────────────────────────────────────────────── */
    .history-list {
      list-style: none;
    }

    .history-list li {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-list li:last-child { border-bottom: none; }

    .history-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-field-label {
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .history-field-value {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-primary);
      font-family: var(--font-mono);
    }

    /* ── Filter bar ──────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .filter-btn:hover {
      border-color: var(--border-focus);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── Repo detail ─────────────────────────────────────────────────────── */
    .repo-detail {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .repo-detail-label {
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Repo trend section ──────────────────────────────────────────────── */
    .repo-trend-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Repo status timeline ────────────────────────────────────────────── */
    .repo-status-timeline {
      border-radius: var(--radius-sm);
      overflow: hidden;
      height: 20px;
      margin-bottom: 14px;
    }

    .repo-status-timeline svg {
      display: block;
      width: 100%;
      height: 100%;
    }


    /* ── Sparkline ───────────────────────────────────────────────────────── */
    .sparkline-svg {
      display: block;
      width: 100%;
      height: 48px;
      margin-bottom: 16px;
    }

    /* ── Alert banner ────────────────────────────────────────────────────── */
    .alert-banner {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-left: 4px solid var(--red);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 24px;
    }

    .alert-banner[hidden] { display: none; }

    .alert-banner-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--red);
      margin-top: 1px;
    }

    .alert-banner-body { flex: 1; min-width: 0; }

    .alert-banner-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 3px;
    }

    .alert-banner-detail {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .alert-banner-detail strong { color: var(--text-primary); }

    /* ── Error ────────────────────────────────────────────────────────────── */
    .error-msg {
      font-size: 0.82rem;
      color: var(--red);
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" fill="white"/>
        <circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
      </svg>
    </div>
    <span class="topbar-title">RepoPulse</span>
    <span class="topbar-subtitle">Command Center</span>
    <div class="topbar-spacer"></div>
    <div class="pulse-indicator">
      <div class="pulse-dot"></div>
      Live · 3s
    </div>
  </header>

  <div class="page">

    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Real-time health and risk overview across all tracked repositories.</p>
    </div>

    <!-- Alert banner -->
    <div id="alert-banner" class="alert-banner" hidden>
      <svg class="alert-banner-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M10 2L2 17h16L10 2z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
        <path d="M10 8v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        <circle cx="10" cy="14.5" r="0.75" fill="currentColor"/>
      </svg>
      <div class="alert-banner-body">
        <div id="alert-banner-title" class="alert-banner-title"></div>
        <div id="alert-banner-detail" class="alert-banner-detail"></div>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Summary</span>
        <div class="section-divider"></div>
      </div>
      <div id="summary-cards" class="card-grid">
        <div class="card"><div class="card-label">Loading</div><div class="card-value">—</div></div>
      </div>
    </div>

    <!-- Projects table -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Projects</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Repository Status</h2>
          <span id="projects-count" class="panel-count">—</span>
        </div>
        <div class="panel-body">
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="At Risk">At Risk</button>
            <button class="filter-btn" data-filter="Healthy">Healthy</button>
          </div>
          <div id="projects-container"><p class="error-msg">Loading…</p></div>
          <div id="repo-detail" class="repo-detail" hidden></div>
        </div>
      </div>
    </div>

    <!-- History chart -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Risk Score Over Time</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Risk Score History</h2>
          <span id="chart-count" class="panel-count">— snapshots</span>
        </div>
        <div class="panel-body" style="padding: 16px 20px 8px;">
          <svg id="history-chart" class="chart-svg" aria-label="Risk score history chart">
            <defs>
              <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <text x="50%" y="50%" text-anchor="middle" class="chart-axis-label">Loading…</text>
          </svg>
        </div>
      </div>
    </div>

    <!-- History list -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Snapshot Log</span>
        <div class="section-divider"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>Snapshot History</h2>
        </div>
        <div class="panel-body">
          <svg id="history-sparkline" class="sparkline-svg" aria-label="Risk score sparkline — last 10 snapshots"></svg>
          <div id="history-list"><p class="error-msg">Loading…</p></div>
        </div>
      </div>
    </div>

  </div><!-- /page -->

  <script>
    // ── Helpers ─────────────────────────────────────────────────────────────

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function colorClass(field, value) {
      if (typeof value !== 'string') return '';
      var v = value.toLowerCase().replace(/\s+/g, '-');
      if (field === 'systemStatus') return v === 'at-risk' ? 'at-risk' : 'healthy';
      if (field === 'alertState')   return v;
      if (field === 'trend')        return v;
      return '';
    }

    function badgeFields() {
      return { systemStatus: true, alertState: true, trend: true };
    }

    function card(label, value, field) {
      var cls = colorClass(field, value);
      var useBadge = badgeFields()[field] && cls;
      var valueHtml = useBadge
        ? '<span class="card-badge ' + cls + '">' + esc(String(value)) + '</span>'
        : '<div class="card-value' + (cls ? ' ' + cls : '') + '">' + esc(String(value)) + '</div>';
      return '<div class="card">'
        + '<div class="card-label">' + esc(label) + '</div>'
        + valueHtml
        + '</div>';
    }

    function showError(id, msg) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = '<p class="error-msg">Failed to load: ' + esc(String(msg)) + '</p>';
    }

    // ── Chart ────────────────────────────────────────────────────────────────

    function renderChart(history) {
      var svg = document.getElementById('history-chart');
      var W = svg.clientWidth  || 880;
      var H = svg.clientHeight || 200;
      var PAD = { top: 20, right: 24, bottom: 36, left: 40 };
      var innerW = W - PAD.left - PAD.right;
      var innerH = H - PAD.top  - PAD.bottom;

      var countEl = document.getElementById('chart-count');
      if (countEl) countEl.textContent = history.length + ' snapshot' + (history.length !== 1 ? 's' : '');

      if (!history.length) {
        svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" class="chart-axis-label">No data yet</text>';
        return;
      }

      var yMin = 0, yMax = 100;

      function xPos(i) {
        return PAD.left + (history.length === 1 ? innerW / 2 : i * (innerW / (history.length - 1)));
      }
      function yPos(v) {
        return PAD.top + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
      }
      function shortDate(iso) {
        var d = new Date(iso);
        return (d.getMonth() + 1) + '/' + d.getDate()
          + ' ' + String(d.getHours()).padStart(2,'0')
          + ':' + String(d.getMinutes()).padStart(2,'0');
      }

      var p = [];

      // Gradient def
      p.push('<defs>'
        + '<linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">'
        + '<stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.2"/>'
        + '<stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>'
        + '</linearGradient></defs>');

      // Gridlines + Y labels
      [0, 25, 50, 75, 100].forEach(function(v) {
        var y = yPos(v);
        p.push('<line class="chart-gridline"'
          + ' x1="' + PAD.left + '" y1="' + y + '"'
          + ' x2="' + (PAD.left + innerW) + '" y2="' + y + '"/>');
        p.push('<text class="chart-axis-label"'
          + ' x="' + (PAD.left - 8) + '" y="' + (y + 4) + '"'
          + ' text-anchor="end">' + v + '</text>');
      });

      // X labels — first and last
      [[0,'start'], [history.length - 1, 'end']].forEach(function(pair) {
        var i = pair[0], anchor = pair[1];
        if (!history[i]) return;
        p.push('<text class="chart-axis-label"'
          + ' x="' + xPos(i) + '" y="' + (H - 8) + '"'
          + ' text-anchor="' + anchor + '">'
          + esc(shortDate(history[i].lastUpdated)) + '</text>');
      });

      // Area
      var aD = 'M ' + xPos(0) + ' ' + yPos(history[0].riskScore);
      history.forEach(function(h, i) { if (i > 0) aD += ' L ' + xPos(i) + ' ' + yPos(h.riskScore); });
      aD += ' L ' + xPos(history.length - 1) + ' ' + yPos(yMin)
          + ' L ' + xPos(0) + ' ' + yPos(yMin) + ' Z';
      p.push('<path class="chart-area" d="' + aD + '"/>');

      // Line
      var lD = 'M ' + xPos(0) + ' ' + yPos(history[0].riskScore);
      history.forEach(function(h, i) { if (i > 0) lD += ' L ' + xPos(i) + ' ' + yPos(h.riskScore); });
      p.push('<path class="chart-line" d="' + lD + '"/>');

      // Dots
      history.forEach(function(h, i) {
        var cls = 'chart-dot' + (h.riskScore >= 50 ? ' risk-high' : '');
        p.push('<circle class="' + cls + '"'
          + ' cx="' + xPos(i) + '" cy="' + yPos(h.riskScore) + '" r="4.5">'
          + '<title>' + esc(shortDate(h.lastUpdated)) + ' — ' + h.riskScore + '%</title>'
          + '</circle>');
      });

      svg.innerHTML = p.join('');
    }

    // ── Sparkline ────────────────────────────────────────────────────────────

    function renderSparkline(data) {
      var svg = document.getElementById('history-sparkline');
      if (!svg) return;
      if (!data.length) { svg.innerHTML = ''; return; }
      var W = svg.clientWidth || 600;
      var H = 48;
      var PAD = 4;
      var innerW = W - PAD * 2;
      var innerH = H - PAD * 2;

      function xPos(i) {
        return PAD + (data.length === 1 ? innerW / 2 : i * (innerW / (data.length - 1)));
      }
      function yPos(v) {
        return PAD + innerH - (v / 100) * innerH;
      }

      var pts = data.map(function(h, i) {
        return xPos(i) + ',' + yPos(h.riskScore);
      }).join(' ');

      var last = data[data.length - 1];
      var dotColor = last.riskScore >= 50 ? 'var(--red)' : 'var(--blue)';

      svg.innerHTML =
        '<polyline points="' + pts + '"'
        + ' fill="none" stroke="var(--blue)" stroke-width="2"'
        + ' stroke-linejoin="round" stroke-linecap="round"/>'
        + '<circle cx="' + xPos(data.length - 1) + '" cy="' + yPos(last.riskScore) + '" r="3.5"'
        + ' fill="' + dotColor + '" stroke="var(--surface)" stroke-width="1.5">'
        + '<title>Latest: ' + last.riskScore + '%</title>'
        + '</circle>';
    }

    // ── Data fetchers ────────────────────────────────────────────────────────

    function updateAlertBanner(d) {
      var isCritical  = d.alertState === 'Critical';
      var isWorsening = d.trend === 'Worsening';
      var banner      = document.getElementById('alert-banner');

      if (!isCritical && !isWorsening) {
        banner.hidden = true;
        return;
      }

      var title = isCritical ? 'Critical Alert — Immediate Attention Required'
                             : 'Risk Trending Up — Monitor Closely';

      var reasons = [];
      if (isCritical)  reasons.push('alert state is <strong>Critical</strong>');
      if (isWorsening) reasons.push('trend is <strong>Worsening</strong>');

      var detail = 'System status: <strong>' + esc(d.systemStatus) + '</strong>. '
        + 'Risk score: <strong>' + esc(String(d.riskScore)) + '%</strong>. '
        + reasons.join(' and ') + '.';

      document.getElementById('alert-banner-title').textContent  = title;
      document.getElementById('alert-banner-detail').innerHTML   = detail;
      banner.hidden = false;
    }

    function loadSummary() {
      fetch('/summary')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var fields = [
            ['totalProjects',   d.totalProjects,   'totalProjects'],
            ['healthyProjects', d.healthyProjects,  'healthyProjects'],
            ['atRiskProjects',  d.atRiskProjects,   'atRiskProjects'],
            ['riskScore',       d.riskScore + '%',  'riskScore'],
            ['systemStatus',    d.systemStatus,     'systemStatus'],
            ['alertState',      d.alertState,       'alertState'],
            ['trend',           d.trend,            'trend'],
          ];
          document.getElementById('summary-cards').innerHTML =
            fields.map(function(f) { return card(f[0], f[1], f[2]); }).join('');
          updateAlertBanner(d);
        })
        .catch(function(e) { showError('summary-cards', e.message); });
    }

    var _projects = [];
    var _selectedId = null;
    var _activeFilter = 'All';

    function buildRepoStatusTimeline(entries) {
      if (!entries.length) return '';
      var W = 400, H = 20;
      var segW = W / entries.length;
      var lastIdx = entries.length - 1;
      var rects = entries.map(function(e, i) {
        var x       = i * segW;
        var fill    = e.status === 'At Risk' ? 'var(--red)' : 'var(--green)';
        var isLast  = i === lastIdx;
        var opacity = isLast ? '1' : '0.8';
        var stroke  = isLast ? 'rgba(255,255,255,0.7)' : 'none';
        var d    = new Date(e.lastUpdated);
        var ts   = (d.getMonth() + 1) + '/' + d.getDate()
          + ' ' + String(d.getHours()).padStart(2, '0')
          + ':' + String(d.getMinutes()).padStart(2, '0');
        return '<rect'
          + ' x="' + x.toFixed(1) + '" y="0"'
          + ' width="' + Math.max(1, segW - 1).toFixed(1) + '" height="' + H + '"'
          + ' fill="' + fill + '" opacity="' + opacity + '"'
          + ' stroke="' + stroke + '" stroke-width="1.5">'
          + '<title>' + esc(ts + ' — ' + e.status + (isLast ? ' (latest)' : '')) + '</title>'
          + '</rect>';
      }).join('');
      return '<div class="repo-status-timeline">'
        + '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none"'
        + ' aria-label="Status timeline — ' + entries.length
        + ' snapshot' + (entries.length !== 1 ? 's' : '') + ', oldest to newest">'
        + rects
        + '</svg>'
        + '</div>';
    }

    function renderRepoHistorySection(entries) {
      var section = document.getElementById('repo-history-section');
      if (!section) return;

      if (!entries.length) {
        section.innerHTML =
          '<p style="color:var(--text-muted);font-size:0.82rem;line-height:1.5;">'
          + 'No snapshots recorded for this repo yet. '
          + 'History collects automatically each worker cycle.'
          + '</p>';
        return;
      }

      var sorted = entries.slice().sort(function(a, b) {
        return new Date(b.lastUpdated) - new Date(a.lastUpdated);
      });
      var recent5 = sorted.slice(0, 5);

      var rows = recent5.map(function(e) {
        var pillClass = e.status === 'At Risk' ? 'at-risk' : 'healthy';
        return '<tr>'
          + '<td>' + esc(e.lastUpdated) + '</td>'
          + '<td><span class="status-pill ' + pillClass + '">' + esc(e.status) + '</span></td>'
          + '</tr>';
      }).join('');

      section.innerHTML =
        buildRepoStatusTimeline(recent5.slice().reverse())
        + '<table>'
        + '<thead><tr><th>Timestamp</th><th>Status</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>';
    }

    function selectRepo(project) {
      _selectedId = project.id;

      // Highlight selected row (only visible rows are in DOM)
      var tbody = document.querySelector('#projects-container tbody');
      if (tbody) {
        Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr) {
          tr.classList.toggle('row-selected', tr.dataset.id === String(project.id));
        });
      }

      // Render static panel content immediately
      var isAtRisk    = project.status === 'At Risk';
      var badgeClass  = isAtRisk ? 'at-risk' : 'healthy';
      var explanation = isAtRisk ? 'Multiple risk signals detected' : 'No risk signals triggered';
      var actionHint  = isAtRisk ? 'Investigate recent activity and issue backlog' : 'No immediate action required';

      var detail = document.getElementById('repo-detail');
      detail.hidden = false;
      detail.innerHTML =
        '<div class="repo-detail-label">Selected Repository</div>'
        + '<div class="card-grid">'
        + '<div class="card"><div class="card-label">Name</div><div class="card-value" style="font-size:0.9rem;word-break:break-all;">' + esc(project.name) + '</div></div>'
        + '<div class="card"><div class="card-label">ID</div><div class="card-value">' + esc(String(project.id)) + '</div></div>'
        + '<div class="card"><div class="card-label">Status</div><div class="card-value"><span class="card-badge ' + badgeClass + '">' + esc(project.status) + '</span></div></div>'
        + '<div class="card"><div class="card-label">Assessment</div><div class="card-value" style="font-size:0.82rem;font-weight:500;">' + esc(explanation) + '</div></div>'
        + '<div class="card" style="grid-column:span 2"><div class="card-label">Recommended Action</div><div class="card-value" style="font-size:0.82rem;font-weight:500;color:var(--text-secondary);">' + esc(actionHint) + '</div></div>'
        + '</div>'
        + '<div class="repo-trend-section">'
        + '<div class="repo-detail-label">Trend &amp; History</div>'
        + '<div id="repo-history-section">'
        + '<p style="color:var(--text-muted);font-size:0.82rem;">Loading history&hellip;</p>'
        + '</div>'
        + '</div>';

      // Fetch repo history; discard result if the user has selected a different repo
      var fetchedForId = project.id;
      fetch('/repo-history/' + fetchedForId)
        .then(function(r) { return r.json(); })
        .then(function(entries) {
          if (_selectedId !== fetchedForId) return;
          renderRepoHistorySection(entries);
        })
        .catch(function() {
          if (_selectedId !== fetchedForId) return;
          var section = document.getElementById('repo-history-section');
          if (section) section.innerHTML =
            '<p style="color:var(--red);font-size:0.82rem;">Failed to load history.</p>';
        });
    }

    function renderProjectsTable(filtered) {
      var countEl = document.getElementById('projects-count');
      if (countEl) {
        countEl.textContent = _activeFilter === 'All'
          ? filtered.length + ' repo' + (filtered.length !== 1 ? 's' : '')
          : filtered.length + ' / ' + _projects.length + ' repo' + (_projects.length !== 1 ? 's' : '');
      }

      if (!filtered.length) {
        document.getElementById('projects-container').innerHTML =
          '<p style="color:var(--text-muted);font-size:0.85rem;">No repositories match the current filter.</p>';
        _selectedId = null;
        var detail = document.getElementById('repo-detail');
        detail.hidden = false;
        detail.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No repositories match the current filter.</p>';
        return;
      }

      var rows = filtered.map(function(p) {
        var pillClass = p.status === 'At Risk' ? 'at-risk' : 'healthy';
        return '<tr data-id="' + esc(String(p.id)) + '">'
          + '<td>' + esc(String(p.id)) + '</td>'
          + '<td>' + esc(p.name) + '</td>'
          + '<td><span class="status-pill ' + pillClass + '">' + esc(p.status) + '</span></td>'
          + '</tr>';
      }).join('');

      document.getElementById('projects-container').innerHTML =
        '<table>'
        + '<thead><tr><th>ID</th><th>Name</th><th>Status</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>';

      var tbody = document.querySelector('#projects-container tbody');
      tbody.addEventListener('click', function(e) {
        var tr = e.target.closest('tr');
        if (!tr) return;
        var project = _projects.find(function(p) { return String(p.id) === tr.dataset.id; });
        if (project) selectRepo(project);
      });

      // Restore selection if still visible, else auto-select first visible
      var toSelect = _selectedId !== null
        ? filtered.find(function(p) { return p.id === _selectedId; })
        : null;
      selectRepo(toSelect || filtered[0]);
    }

    function applyFilter() {
      Array.prototype.forEach.call(document.querySelectorAll('.filter-btn'), function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === _activeFilter);
      });
      var filtered = _activeFilter === 'All'
        ? _projects
        : _projects.filter(function(p) { return p.status === _activeFilter; });
      renderProjectsTable(filtered);
    }

    function loadProjects() {
      fetch('/projects')
        .then(function(r) { return r.json(); })
        .then(function(projects) {
          _projects = projects;
          if (!projects.length) {
            document.getElementById('projects-count').textContent = '0 repos';
            document.getElementById('projects-container').innerHTML =
              '<p style="color:var(--text-muted);font-size:0.85rem;">No projects found.</p>';
            document.getElementById('repo-detail').hidden = true;
            return;
          }
          applyFilter();
        })
        .catch(function(e) { showError('projects-container', e.message); });
    }

    function loadHistory() {
      fetch('/history')
        .then(function(r) { return r.json(); })
        .then(function(history) {
          renderChart(history);

          if (!history.length) {
            document.getElementById('history-list').innerHTML =
              '<p style="color:var(--text-muted);font-size:0.85rem;">No history recorded yet.</p>';
            renderSparkline([]);
            return;
          }

          var sorted = history.slice().sort(function(a, b) {
            return new Date(b.lastUpdated) - new Date(a.lastUpdated);
          });
          var recent5 = sorted.slice(0, 5);
          renderSparkline(recent5.slice().reverse());
          var rows = recent5.map(function(h, i) {
            return '<tr' + (i === 0 ? ' class="row-latest"' : '') + '>'
              + '<td>' + esc(h.lastUpdated) + '</td>'
              + '<td>' + esc(String(h.totalProjects)) + '</td>'
              + '<td>' + esc(String(h.healthyProjects)) + '</td>'
              + '<td>' + esc(String(h.atRiskProjects)) + '</td>'
              + '<td>' + esc(String(h.riskScore)) + '%</td>'
              + '<td><span class="card-badge ' + colorClass('trend', h.trend) + '">' + esc(h.trend) + '</span></td>'
              + '<td><span class="card-badge ' + colorClass('alertState', h.alertState) + '">' + esc(h.alertState) + '</span></td>'
              + '</tr>';
          }).join('');
          document.getElementById('history-list').innerHTML =
            '<table>'
            + '<thead><tr>'
            + '<th>Timestamp</th><th>Total</th><th>Healthy</th>'
            + '<th>At Risk</th><th>Risk Score</th><th>Trend</th><th>Alert State</th>'
            + '</tr></thead>'
            + '<tbody>' + rows + '</tbody>'
            + '</table>';
        })
        .catch(function(e) {
          document.getElementById('history-list').innerHTML =
            '<p class="error-msg">Failed to load: ' + esc(String(e.message)) + '</p>';
        });
    }

    // ── Filter bar wiring ────────────────────────────────────────────────────

    document.querySelector('.filter-bar').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      _activeFilter = btn.dataset.filter;
      applyFilter();
    });

    // ── Initial load + auto-refresh ──────────────────────────────────────────

    function refresh() {
      loadSummary();
      loadProjects();
      loadHistory();
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
